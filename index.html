<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCO Vision AI — Scan Integrity Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0ede8; min-height: 100vh; display: flex; justify-content: center; padding: 24px 16px; }
  #root { width: 100%; max-width: 1100px; }
  select { font-family: inherit; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── Layout constants ──────────────────────────────────────────
// Col3 cards (top y=36, proportional heights, min None=85):
//   Staff:    y=36,  h=140, bottom=176
//   Cust:     y=186, h=90,  bottom=276   (gap=10)
//   None:     y=286, h=85,  bottom=371   (gap=10)
//
// Col2 AI-flagged: y=36, bottom=371, h=335
// Col2 Normal gap = Normal_h/4 = 80/4 = 20 → Normal y=391
//   Normal: y=391, h=80, bottom=471
//
// Col1: y=36, bottom=471, h=435
//
// Col4 Recovered: y=36,  h=190, bottom=226
// Col4 At risk:   y=238, h=133, bottom=371
//
// viewBox height = 490
// ─────────────────────────────────────────────────────────────

const STORES = {
  s1: { name: "Downtown Store", sco: 4, periods: {
    q1: { txn: "1,240", items: "4,650", sales: "$18,400" },
    q2: { txn: "1,310", items: "4,890", sales: "$19,200" },
    q3: { txn: "1,380", items: "5,120", sales: "$20,100" },
    q4: { txn: "1,190", items: "4,420", sales: "$17,600" },
  }},
  s2: { name: "Westside Store", sco: 6, periods: {
    q1: { txn: "1,880", items: "6,920", sales: "$27,100" },
    q2: { txn: "1,960", items: "7,180", sales: "$28,400" },
    q3: { txn: "2,040", items: "7,510", sales: "$29,800" },
    q4: { txn: "1,820", items: "6,700", sales: "$26,200" },
  }},
  s3: { name: "Eastgate Store", sco: 3, periods: {
    q1: { txn: "890",   items: "3,280", sales: "$13,600" },
    q2: { txn: "940",   items: "3,450", sales: "$14,200" },
    q3: { txn: "980",   items: "3,610", sales: "$14,900" },
    q4: { txn: "860",   items: "3,160", sales: "$13,100" },
  }},
};

const PERIODS = {
  q1: { label: "Jan 1 – Mar 31, 2025 · Q1 2025", short: "Q1 2025",
        total: 113840, normal: 110185, normalItems: 418703, flag: 3655, flagItems: 10840,
        staff: 1758, staffItems: 5210, cust: 1166, custItems: 3470,
        none: 731, noneItems: 2160, rec: "$42,680", risk: "$10,672", recTxns: 2924, recItems: 8680,
        qtlySales: 1656000 },
  q2: { label: "Apr 1 – Jun 30, 2025 · Q2 2025", short: "Q2 2025",
        total: 118400, normal: 114460, normalItems: 434948, flag: 3940, flagItems: 11820,
        staff: 1930, staffItems: 5740, cust: 1240, custItems: 3680,
        none: 770, noneItems: 2400, rec: "$46,200", risk: "$11,340", recTxns: 3170, recItems: 9420,
        qtlySales: 1728000 },
  q3: { label: "Jul 1 – Sep 30, 2025 · Q3 2025", short: "Q3 2025",
        total: 121600, normal: 117540, normalItems: 446652, flag: 4060, flagItems: 12180,
        staff: 1980, staffItems: 5900, cust: 1310, custItems: 3890,
        none: 770, noneItems: 2390, rec: "$48,720", risk: "$11,550", recTxns: 3290, recItems: 9790,
        qtlySales: 1809000 },
  q4: { label: "Oct 1 – Dec 31, 2025 · Q4 2025", short: "Q4 2025",
        total: 109200, normal: 105540, normalItems: 401052, flag: 3660, flagItems: 10980,
        staff: 1740, staffItems: 5180, cust: 1160, custItems: 3440,
        none: 760, noneItems: 2360, rec: "$41,280", risk: "$10,830", recTxns: 2900, recItems: 8620,
        qtlySales: 1584000 },
};

const fmt = n => n.toLocaleString();
const pct = (a, b) => (a / b * 100).toFixed(1) + "%";
const T = ({ children, ...p }) => (
  <text fontFamily="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" {...p}>{children}</text>
);

const KpiCard = ({ cls, lbl, val, sub }) => {
  const colors = {
    r:  { bg: "#FCEBEB", border: "#F7C1C1", lbl: "#A32D2D", val: "#A32D2D", sub: "#A32D2D" },
    a:  { bg: "#FAEEDA", border: "#FAC775", lbl: "#854F0B", val: "#854F0B", sub: "#854F0B" },
    gr: { bg: "#EAF3DE", border: "#C0DD97", lbl: "#3B6D11", val: "#3B6D11", sub: "#3B6D11" },
    g:  { bg: "#f5f4f0", border: "rgba(0,0,0,0.12)", lbl: "#888780", val: "#1a1a18", sub: "#888780" },
  }[cls];
  return (
    <div style={{ borderRadius: 8, padding: "12px 14px", border: `0.5px solid ${colors.border}`, background: colors.bg }}>
      <div style={{ fontSize: 11, color: colors.lbl, marginBottom: 3 }}>{lbl}</div>
      <div style={{ fontSize: 20, fontWeight: 500, color: colors.val }}>{val}</div>
      <div style={{ fontSize: 11, color: colors.sub, marginTop: 2 }}>{sub}</div>
    </div>
  );
};

const LegDot = ({ color, label }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "#5f5e5a" }}>
    <div style={{ width: 10, height: 10, borderRadius: 2, background: color, flexShrink: 0 }} />
    {label}
  </div>
);

function Dashboard() {
  const [sk, setSk] = useState("s1");
  const [pk, setPk] = useState("q1");
  const s = STORES[sk], p = PERIODS[pk];
  const pStaff = pct(p.staff, p.flag);
  const pCust  = pct(p.cust,  p.flag);
  const pNone  = pct(p.none,  p.flag);
  const recPct  = (parseInt(p.rec.replace(/[$,]/g,""))  / p.qtlySales * 100).toFixed(1) + "%";
  const riskPct = (parseInt(p.risk.replace(/[$,]/g,"")) / p.qtlySales * 100).toFixed(1) + "%";

  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: "22px 26px 20px", boxShadow: "0 1px 4px rgba(0,0,0,0.08)", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>

      {/* ── filters ── */}
      <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 11, color: "#888780" }}>Time period</span>
          <select value={pk} onChange={e => setPk(e.target.value)}
            style={{ fontSize: 12, padding: "5px 10px", border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 6, background: "#fff", color: "#1a1a18", cursor: "pointer" }}>
            <option value="q1">Q1 2025 (Jan – Mar)</option>
            <option value="q2">Q2 2025 (Apr – Jun)</option>
            <option value="q3">Q3 2025 (Jul – Sep)</option>
            <option value="q4">Q4 2025 (Oct – Dec)</option>
          </select>
        </div>
        <div style={{ width: 0.5, height: 20, background: "rgba(0,0,0,0.12)" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 11, color: "#888780" }}>Store</span>
          <select value={sk} onChange={e => setSk(e.target.value)}
            style={{ fontSize: 12, padding: "5px 10px", border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 6, background: "#fff", color: "#1a1a18", cursor: "pointer" }}>
            <option value="s1">Downtown Store</option>
            <option value="s2">Westside Store</option>
            <option value="s3">Eastgate Store</option>
          </select>
        </div>
      </div>

      {/* ── summary bar ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, gap: 16 }}>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          {[["SCO lanes", s.sco + " units"],
            ["Quarterly transactions", fmt(p.total) + " txns"],
            ["Quarterly items scanned", fmt(p.normalItems + p.flagItems) + " items"],
            ["Quarterly total sales", "$" + p.qtlySales.toLocaleString()]
          ].map(([l, v]) => (
            <div key={l} style={{ background: "#f5f4f0", border: "0.5px solid rgba(0,0,0,0.1)", borderRadius: 8, padding: "7px 14px" }}>
              <div style={{ fontSize: 11, color: "#888780", marginBottom: 2 }}>{l}</div>
              <div style={{ fontSize: 14, fontWeight: 500, color: "#1a1a18" }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ textAlign: "right", flexShrink: 0 }}>
          <div style={{ fontSize: 15, fontWeight: 500, color: "#1a1a18" }}>{s.name}</div>
          <div style={{ fontSize: 11, color: "#888780", marginTop: 2 }}>{p.label}</div>
          <button style={{ marginTop: 6, fontSize: 11, padding: "4px 11px", border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 6, background: "#fff", color: "#888780", cursor: "pointer" }}>
            Export report ↓
          </button>
        </div>
      </div>

      <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>
        Transaction integrity flow — AI scan miss detection
      </div>

      <div style={{ background: "#fff", border: "0.5px solid rgba(0,0,0,0.1)", borderRadius: 12, padding: "14px 16px 10px", marginBottom: 12 }}>
        <svg width="100%" viewBox="0 0 900 490" style={{ display: "block" }}>

          {/* column headers */}
          <T fontSize="10" fill="#B4B2A9" x="78"  y="16" textAnchor="middle">① Volume</T>
          <T fontSize="10" fill="#B4B2A9" x="290" y="16" textAnchor="middle">② AI detection</T>
          <T fontSize="10" fill="#B4B2A9" x="580" y="16" textAnchor="middle">③ Response</T>
          <T fontSize="10" fill="#B4B2A9" x="845" y="16" textAnchor="middle">④ $</T>

          {/* ── Col1: volume bar y=36 h=435 bottom=471 ── */}
          <rect x="14" y="36" width="128" height="435" rx="8" fill="#DEDAD4" stroke="#C8C5BE" strokeWidth="0.5"/>
          <T fontSize="11" fill="#6B6966" x="78" y="80"  textAnchor="middle">Total SCO</T>
          <T fontSize="11" fill="#6B6966" x="78" y="94"  textAnchor="middle">transactions</T>
          <T fontSize="22" fontWeight="500" fill="#3d3d3a" x="78" y="148" textAnchor="middle">{fmt(p.total)}</T>
          <T fontSize="10" fill="#9c9a92" x="78" y="164" textAnchor="middle">{p.short} total</T>

          {/* col1 → col2 AI-flagged fill */}
          <path d="M142 36 C172 36 178 36 196 36 L196 371 C178 371 172 371 142 371 Z"
                fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>
          {/* col1 → col2 Normal fill */}
          <path d="M142 391 C168 391 178 395 196 395 L196 471 C178 471 168 467 142 471"
                fill="#ECEAE4" stroke="#D3D1C7" strokeWidth="0.5"/>

          {/* ── Col2: AI-flagged  y=36 h=335 bottom=371 ── */}
          <rect x="196" y="36" width="190" height="335" rx="8" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>
          <T fontSize="11" fontWeight="500" fill="#791F1F" x="291" y="62"  textAnchor="middle">AI-flagged scan miss</T>
          <line x1="208" y1="70" x2="374" y2="70" stroke="#F09595" strokeWidth="0.5"/>
          <T fontSize="16" fontWeight="500" fill="#A32D2D" x="240" y="94"  textAnchor="middle">{fmt(p.flag)}</T>
          <T fontSize="10" fill="#A32D2D"               x="240" y="107" textAnchor="middle">txns</T>
          <T fontSize="10" fill="#A32D2D"               x="348" y="94"  textAnchor="middle">{pct(p.flag, p.total)} of total</T>
          <T fontSize="13" fontWeight="500" fill="#C4785A" x="240" y="126" textAnchor="middle">{fmt(p.flagItems)}</T>
          <T fontSize="10" fill="#C4785A"               x="240" y="139" textAnchor="middle">items</T>
          <T fontSize="10" fill="#C4785A"               x="348" y="126" textAnchor="middle">{pct(p.flagItems, p.normalItems + p.flagItems)} of total</T>

          {/* ── Col2: Normal  y=391 h=80 bottom=471  (gap=20=80/4) ── */}
          <rect x="196" y="391" width="190" height="80" rx="8" fill="#F5F4F0" stroke="#D3D1C7" strokeWidth="0.5"/>
          <T fontSize="11" fill="#888780" x="291" y="413" textAnchor="middle">Normal transactions</T>
          <line x1="208" y1="421" x2="374" y2="421" stroke="#D3D1C7" strokeWidth="0.5"/>
          <T fontSize="14" fontWeight="500" fill="#888780" x="240" y="443" textAnchor="middle">{fmt(p.normal)}</T>
          <T fontSize="10" fill="#888780"               x="240" y="456" textAnchor="middle">txns</T>
          <T fontSize="10" fill="#888780"               x="348" y="443" textAnchor="middle">{pct(p.normal, p.total)} of total</T>

          {/* ── Col2→Col3 flow paths ──
              AI-flagged right edge x=386, spans y=36–371
              Bands proportional to card heights:
                Staff band  : y=36–176   (h=140)
                Cust band   : y=176–276  (h=100, with 10px gap absorbed into curve)
                None band   : y=276–371  (h=95)
          */}
          {/* Staff flow: source y=36–176, target y=36–176 */}
          <path d="M386 36  C440 36  440 36  492 36
                   L492 176 C440 176 440 176 386 176"
                fill="#FAEEDA" stroke="#EF9F27" strokeWidth="1.5"/>
          {/* Cust flow: source y=186–276, target y=186–276 */}
          <path d="M386 186 C440 186 440 186 492 186
                   L492 276 C440 276 440 276 386 276"
                fill="#E1F5EE" stroke="#1D9E75" strokeWidth="1.5"/>
          {/* None flow: source y=286–371, target y=286–371 */}
          <path d="M386 286 C440 286 440 286 492 286
                   L492 371 C440 371 440 371 386 371"
                fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>

          {/* ── Col3: Staff rescan  y=36 h=140 bottom=176 ── */}
          <rect x="492" y="36" width="182" height="140" rx="8" fill="#FAEEDA" stroke="#EF9F27" strokeWidth="1.5"/>
          <T fontSize="11" fontWeight="500" fill="#633806" x="583" y="60"  textAnchor="middle">Staff rescan</T>
          <line x1="504" y1="68" x2="662" y2="68" stroke="#FAC775" strokeWidth="0.5"/>
          <T fontSize="16" fontWeight="500" fill="#854F0B" x="535" y="92"  textAnchor="middle">{fmt(p.staff)}</T>
          <T fontSize="10" fill="#854F0B"               x="535" y="105" textAnchor="middle">txns</T>
          <T fontSize="10" fill="#854F0B"               x="638" y="92"  textAnchor="middle">{pStaff} of flagged</T>
          <T fontSize="13" fontWeight="500" fill="#BA7517" x="535" y="124" textAnchor="middle">{fmt(p.staffItems)}</T>
          <T fontSize="10" fill="#BA7517"               x="535" y="137" textAnchor="middle">items</T>
          <T fontSize="10" fill="#BA7517"               x="638" y="124" textAnchor="middle">{pct(p.staffItems, p.flagItems)} of flagged</T>

          {/* ── Col3: Customer rescan  y=186 h=90 bottom=276 ── */}
          <rect x="492" y="186" width="182" height="90" rx="8" fill="#E1F5EE" stroke="#1D9E75" strokeWidth="1.5"/>
          <T fontSize="11" fontWeight="500" fill="#085041" x="583" y="208" textAnchor="middle">Customer rescan</T>
          <line x1="504" y1="216" x2="662" y2="216" stroke="#9FE1CB" strokeWidth="0.5"/>
          <T fontSize="16" fontWeight="500" fill="#0F6E56" x="535" y="238" textAnchor="middle">{fmt(p.cust)}</T>
          <T fontSize="10" fill="#0F6E56"               x="535" y="250" textAnchor="middle">txns</T>
          <T fontSize="10" fill="#0F6E56"               x="638" y="238" textAnchor="middle">{pCust} of flagged</T>
          <T fontSize="13" fontWeight="500" fill="#1D9E75" x="535" y="265" textAnchor="middle">{fmt(p.custItems)}</T>
          <T fontSize="10" fill="#1D9E75"               x="535" y="276" textAnchor="middle">items</T>

          {/* ── Col3: No intervention  y=286 h=85 bottom=371 ── */}
          <rect x="492" y="286" width="182" height="85" rx="6" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>
          <T fontSize="11" fontWeight="500" fill="#791F1F" x="583" y="308" textAnchor="middle">No intervention</T>
          <line x1="504" y1="316" x2="662" y2="316" stroke="#F09595" strokeWidth="0.5"/>
          <T fontSize="16" fontWeight="500" fill="#A32D2D" x="535" y="336" textAnchor="middle">{fmt(p.none)}</T>
          <T fontSize="10" fill="#A32D2D"               x="535" y="348" textAnchor="middle">txns</T>
          <T fontSize="10" fill="#A32D2D"               x="638" y="336" textAnchor="middle">{pNone} of flagged</T>
          <T fontSize="13" fontWeight="500" fill="#C4785A" x="535" y="360" textAnchor="middle">{fmt(p.noneItems)}</T>
          <T fontSize="10" fill="#C4785A"               x="535" y="371" textAnchor="middle">items</T>

          {/* ── Col3→Col4 flow paths ──
              Staff+Cust (y=36–276) → Recovered (y=36–226)
              None (y=286–371) → At risk (y=238–371)
          */}
          {/* Recovered flow */}
          <path d="M674 36  C722 36  722 36  758 36
                   L758 226 C722 226 722 226 674 226"
                fill="#EAF3DE" stroke="#97C459" strokeWidth="1.5"/>
          {/* At risk flow */}
          <path d="M674 286 C722 286 722 238 758 238
                   L758 371 C722 371 722 371 674 371"
                fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>

          {/* ── Col4: Recovered revenue  y=36 h=190 bottom=226 ── */}
          <rect x="758" y="36" width="126" height="190" rx="6" fill="#EAF3DE" stroke="#639922" strokeWidth="1.5"/>
          <T fontSize="11" fontWeight="500" fill="#27500A" x="821" y="58"  textAnchor="middle">Recovered revenue</T>
          <T fontSize="10" fill="#639922"               x="821" y="72"  textAnchor="middle">{recPct} of quarterly sales</T>
          <T fontSize="15" fontWeight="500" fill="#3B6D11" x="821" y="98"  textAnchor="middle">{p.rec}</T>
          <line x1="770" y1="108" x2="872" y2="108" stroke="#97C459" strokeWidth="0.5"/>
          <T fontSize="13" fontWeight="500" fill="#3B6D11" x="821" y="130" textAnchor="middle">{fmt(p.recTxns)}</T>
          <T fontSize="10" fill="#639922"               x="821" y="143" textAnchor="middle">txns</T>
          <T fontSize="12" fontWeight="500" fill="#639922" x="821" y="162" textAnchor="middle">{fmt(p.recItems)}</T>
          <T fontSize="10" fill="#639922"               x="821" y="175" textAnchor="middle">items</T>

          {/* ── Col4: At risk  y=238 h=133 bottom=371 ── */}
          <rect x="758" y="238" width="126" height="133" rx="6" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1"/>
          <T fontSize="11" fontWeight="500" fill="#791F1F" x="821" y="260" textAnchor="middle">At risk</T>
          <T fontSize="10" fill="#A32D2D"               x="821" y="274" textAnchor="middle">{riskPct} of quarterly sales</T>
          <T fontSize="15" fontWeight="500" fill="#A32D2D" x="821" y="300" textAnchor="middle">{p.risk}</T>
          <line x1="770" y1="310" x2="872" y2="310" stroke="#F09595" strokeWidth="0.5"/>
          <T fontSize="13" fontWeight="500" fill="#A32D2D" x="821" y="330" textAnchor="middle">{fmt(p.none)}</T>
          <T fontSize="10" fill="#A32D2D"               x="821" y="342" textAnchor="middle">txns</T>
          <T fontSize="12" fontWeight="500" fill="#C4785A" x="821" y="358" textAnchor="middle">{fmt(p.noneItems)}</T>
          <T fontSize="10" fill="#C4785A"               x="821" y="368" textAnchor="middle">items</T>

        </svg>
      </div>

      {/* ── AI insights ── */}
      <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>AI insights</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
        <div style={{ borderRadius: 8, padding: "12px 14px", borderLeft: "3px solid #639922", background: "#EAF3DE" }}>
          <div style={{ fontSize: 10, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "#3B6D11", marginBottom: 5 }}>What AI recovered</div>
          <div style={{ fontSize: 12, lineHeight: 1.6, color: "#27500A" }}>
            Staff and customer rescans together recovered <strong>{p.rec}</strong> in {p.short} — across <strong>{fmt(p.recTxns)} transactions</strong> and {fmt(p.recItems)} items flagged by AI. That's revenue that would otherwise have walked out the door undetected.
          </div>
        </div>
        <div style={{ borderRadius: 8, padding: "12px 14px", borderLeft: "3px solid #BA7517", background: "#FAEEDA" }}>
          <div style={{ fontSize: 10, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "#854F0B", marginBottom: 5 }}>Opportunity ahead</div>
          <div style={{ fontSize: 12, lineHeight: 1.6, color: "#633806" }}>
            <strong>{pNone} of flagged transactions</strong> ({fmt(p.none)} txns) had no follow-up action. Closing this gap could unlock an estimated <strong>${Math.round(parseInt(p.rec.replace(/[$,]/g,"")) * p.none / p.recTxns).toLocaleString()}+ in additional quarterly recovery</strong> for this store — without adding any new hardware.
          </div>
        </div>
      </div>

      {/* ── Key metrics ── */}
      <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>Key metrics</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,minmax(0,1fr))", gap: 10, marginBottom: 12 }}>
        <KpiCard cls="r"  lbl="Scan-miss rate"   val={pct(p.flag, p.total)}          sub={fmt(p.flag) + " txns · " + fmt(p.flagItems) + " items"} />
        <KpiCard cls="gr" lbl="Rescan rate"       val={pct(p.flag-p.none, p.flag)}    sub={fmt(p.flag-p.none) + " txns rescanned by staff & customer"} />
        <KpiCard cls="gr" lbl="Revenue recovered" val={p.rec}                         sub={p.short + " · avg $" + (parseInt(p.rec.replace(/[$,]/g,"")) / (p.flag-p.none)).toFixed(2) + " / incident"} />
        <KpiCard cls="a"  lbl="Revenue at risk"   val={p.risk}                        sub={fmt(p.none) + " unresolved txns · " + pNone + " of flagged"} />
      </div>

      {/* ── Legend ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: "0.5px solid rgba(0,0,0,0.1)", paddingTop: 8 }}>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
          {[["#C4C2BB","Normal flow"],["#A32D2D","AI-flagged"],["#854F0B","Staff rescan"],["#0F6E56","Customer rescan"],["#3B6D11","Recovered revenue"]].map(([c, l]) => (
            <LegDot key={l} color={c} label={l} />
          ))}
        </div>
        <div style={{ fontSize: 11, color: "#888780", whiteSpace: "nowrap" }}>Powered by <strong>Vision AI</strong> · {p.short}</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Dashboard />);
</script>
</body>
</html>
