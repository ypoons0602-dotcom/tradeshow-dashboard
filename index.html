<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCO Vision AI — Scan Integrity Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0ede8; min-height: 100vh; display: flex; justify-content: center; padding: 24px 16px; }
  #root { width: 100%; max-width: 1100px; }
  select { font-family: inherit; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const STORES = {
  s1: { name: "Store Alpha — District A", sco: 4, txn: "1,240", items: "4,650", sales: "$18,400" },
  s2: { name: "Store Beta — District B",  sco: 6, txn: "1,880", items: "6,920", sales: "$27,100" },
  s3: { name: "Store Gamma — District C", sco: 3, txn: "890",   items: "3,280", sales: "$13,600" },
};

const PERIODS = {
  q1: { label: "Jan 1 – Mar 31, 2025 · Q1 2025", short: "Q1 2025",
        total: 113840, normal: 110185, flag: 3655, flagItems: 10840,
        staff: 1758, staffItems: 5210, cust: 1166, custItems: 3470,
        none: 731, noneItems: 2160, rec: "$42,680", risk: "$10,672", recTxns: 2924, recItems: 8680 },
  q2: { label: "Apr 1 – Jun 30, 2025 · Q2 2025", short: "Q2 2025",
        total: 118400, normal: 114460, flag: 3940, flagItems: 11820,
        staff: 1930, staffItems: 5740, cust: 1240, custItems: 3680,
        none: 770, noneItems: 2400, rec: "$46,200", risk: "$11,340", recTxns: 3170, recItems: 9420 },
  q3: { label: "Jul 1 – Sep 30, 2025 · Q3 2025", short: "Q3 2025",
        total: 121600, normal: 117540, flag: 4060, flagItems: 12180,
        staff: 1980, staffItems: 5900, cust: 1310, custItems: 3890,
        none: 770, noneItems: 2390, rec: "$48,720", risk: "$11,550", recTxns: 3290, recItems: 9790 },
  q4: { label: "Oct 1 – Dec 31, 2024 · Q4 2024", short: "Q4 2024",
        total: 109200, normal: 105540, flag: 3660, flagItems: 10980,
        staff: 1740, staffItems: 5180, cust: 1160, custItems: 3440,
        none: 760, noneItems: 2360, rec: "$41,280", risk: "$10,830", recTxns: 2900, recItems: 8620 },
};

const fmt = n => n.toLocaleString();
const pct = (a, b) => (a / b * 100).toFixed(1) + "%";

const T = ({ children, ...p }) => (
  <text fontFamily="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" {...p}>{children}</text>
);

const KpiCard = ({ cls, lbl, val, sub }) => {
  const colors = {
    r:  { bg: "#FCEBEB", border: "#F7C1C1", lbl: "#A32D2D", val: "#A32D2D", sub: "#A32D2D" },
    a:  { bg: "#FAEEDA", border: "#FAC775", lbl: "#854F0B", val: "#854F0B", sub: "#854F0B" },
    gr: { bg: "#EAF3DE", border: "#C0DD97", lbl: "#3B6D11", val: "#3B6D11", sub: "#3B6D11" },
    g:  { bg: "#f5f4f0", border: "rgba(0,0,0,0.12)", lbl: "#888780", val: "#1a1a18", sub: "#888780" },
  }[cls];
  return (
    <div style={{ borderRadius: 8, padding: "12px 14px", border: `0.5px solid ${colors.border}`, background: colors.bg }}>
      <div style={{ fontSize: 11, color: colors.lbl, marginBottom: 3 }}>{lbl}</div>
      <div style={{ fontSize: 20, fontWeight: 500, color: colors.val }}>{val}</div>
      <div style={{ fontSize: 11, color: colors.sub, marginTop: 2 }}>{sub}</div>
    </div>
  );
};

const LegDot = ({ color, label }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "#5f5e5a" }}>
    <div style={{ width: 10, height: 10, borderRadius: 2, background: color, flexShrink: 0 }} />
    {label}
  </div>
);

function Dashboard() {
  const [sk, setSk] = useState("s1");
  const [pk, setPk] = useState("q1");
  const s = STORES[sk], p = PERIODS[pk];
  const pStaff = pct(p.staff, p.flag);
  const pCust  = pct(p.cust,  p.flag);
  const pNone  = pct(p.none,  p.flag);
  const annualRec = "$" + (parseInt(p.rec.replace(/[$,]/g, "")) * 4).toLocaleString() + "+";

  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: "22px 26px 20px", boxShadow: "0 1px 4px rgba(0,0,0,0.08)", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>

      <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 11, color: "#888780" }}>Time period</span>
          <select value={pk} onChange={e => setPk(e.target.value)}
            style={{ fontSize: 12, padding: "5px 10px", border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 6, background: "#fff", color: "#1a1a18", cursor: "pointer" }}>
            <option value="q1">Q1 2025 (Jan – Mar)</option>
            <option value="q2">Q2 2025 (Apr – Jun)</option>
            <option value="q3">Q3 2025 (Jul – Sep)</option>
            <option value="q4">Q4 2024 (Oct – Dec)</option>
          </select>
        </div>
        <div style={{ width: 0.5, height: 20, background: "rgba(0,0,0,0.12)" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 11, color: "#888780" }}>Store</span>
          <select value={sk} onChange={e => setSk(e.target.value)}
            style={{ fontSize: 12, padding: "5px 10px", border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 6, background: "#fff", color: "#1a1a18", cursor: "pointer" }}>
            <option value="s1">Store Alpha — District A</option>
            <option value="s2">Store Beta — District B</option>
            <option value="s3">Store Gamma — District C</option>
          </select>
        </div>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, gap: 16 }}>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          {[["SCO lanes", s.sco + " units"], ["Daily transactions", s.txn + " txns"], ["Daily items scanned", s.items + " items"], ["Daily total sales", s.sales]].map(([l, v]) => (
            <div key={l} style={{ background: "#f5f4f0", border: "0.5px solid rgba(0,0,0,0.1)", borderRadius: 8, padding: "7px 14px" }}>
              <div style={{ fontSize: 11, color: "#888780", marginBottom: 2 }}>{l}</div>
              <div style={{ fontSize: 14, fontWeight: 500, color: "#1a1a18" }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ textAlign: "right", flexShrink: 0 }}>
          <div style={{ fontSize: 15, fontWeight: 500, color: "#1a1a18" }}>{s.name}</div>
          <div style={{ fontSize: 11, color: "#888780", marginTop: 2 }}>{p.label}</div>
          <button style={{ marginTop: 6, fontSize: 11, padding: "4px 11px", border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 6, background: "#fff", color: "#888780", cursor: "pointer" }}>
            Export report ↓
          </button>
        </div>
      </div>

      <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>
        Transaction integrity flow — AI scan miss detection
      </div>

      <div style={{ background: "#fff", border: "0.5px solid rgba(0,0,0,0.1)", borderRadius: 12, padding: "14px 16px 10px", marginBottom: 12 }}>
        <svg width="100%" viewBox="0 0 900 400" style={{ display: "block" }}>

          <path d="M142 240 C204 240 204 240 268 240 L268 290 C204 290 204 290 142 290" fill="#ECEAE4" stroke="#D3D1C7" strokeWidth="0.5"/>

          <path d="M142 14 C204 14 204 14 268 14 L268 110 C204 110 204 96 142 96 Z" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>

          <rect x="14" y="14" width="128" height="300" rx="8" fill="#F8F7F4" stroke="#D3D1C7" strokeWidth="0.5"/>
          <T fontSize="12" fill="#888780" x="78" y="50" textAnchor="middle">Total SCO</T>
          <T fontSize="12" fill="#888780" x="78" y="65" textAnchor="middle">transactions</T>
          <T fontSize="20" fontWeight="500" fill="#5F5E5A" x="78" y="104" textAnchor="middle">{fmt(p.total)}</T>
          <T fontSize="10" fill="#B4B2A9" x="78" y="120" textAnchor="middle">{p.short} total</T>
          <line x1="26" y1="148" x2="130" y2="148" stroke="#D3D1C7" strokeWidth="0.5"/>
          <T fontSize="10" fill="#C4C2BB" x="78" y="168" textAnchor="middle">{pct(p.normal, p.total)} completed</T>
          <T fontSize="10" fill="#C4C2BB" x="78" y="182" textAnchor="middle">normally</T>

          <rect x="268" y="14" width="176" height="100" rx="8" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="2"/>
          <T fontSize="12" fontWeight="500" fill="#791F1F" x="356" y="36" textAnchor="middle">AI-flagged scan miss</T>
          <T fontSize="16" fontWeight="500" fill="#A32D2D" x="316" y="64" textAnchor="middle">{fmt(p.flag)}</T>
          <line x1="346" y1="52" x2="346" y2="76" stroke="#F09595" strokeWidth="0.5"/>
          <T fontSize="10" fill="#A32D2D" x="316" y="76" textAnchor="middle">txns</T>
          <T fontSize="11" fill="#D4AEAE" x="378" y="62" textAnchor="middle">{fmt(p.flagItems)}</T>
          <T fontSize="10" fill="#D4AEAE" x="378" y="76" textAnchor="middle">items</T>
          <rect x="270" y="84" width="84" height="16" rx="4" fill="#FCEBEB" stroke="#F09595" strokeWidth="0.5"/>
          <T fontSize="10" fontWeight="500" fill="#A32D2D" x="312" y="95" textAnchor="middle">{pct(p.flag, p.total)} of total</T>

          <rect x="268" y="236" width="176" height="58" rx="8" fill="#F5F4F0" stroke="#D3D1C7" strokeWidth="0.5"/>
          <T fontSize="11" fill="#888780" x="356" y="258" textAnchor="middle">Normal transactions</T>
          <T fontSize="15" fontWeight="500" fill="#888780" x="356" y="280" textAnchor="middle">{fmt(p.normal)}</T>
          <T fontSize="10" fill="#B4B2A9" x="356" y="293" textAnchor="middle">{pct(p.normal, p.total)} · no action needed</T>

          <path d="M444 20 C510 20 510 26 568 26 L568 78 C510 78 510 56 444 54" fill="#FAEEDA" stroke="#EF9F27" strokeWidth="1.5"/>
          <path d="M444 58 C510 58 510 102 568 104 L568 160 C510 160 510 92 444 90" fill="#E1F5EE" stroke="#1D9E75" strokeWidth="1.5"/>
          <path d="M444 94 C510 94 510 180 568 182 L568 222 C510 222 510 110 444 108" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1"/>

          <rect x="568" y="14" width="168" height="76" rx="8" fill="#FAEEDA" stroke="#EF9F27" strokeWidth="2"/>
          <T fontSize="11" fontWeight="500" fill="#633806" x="652" y="32" textAnchor="middle">Staff rescan</T>
          <T fontSize="10" fill="#854F0B" x="652" y="46" textAnchor="middle">{pStaff} of flagged txns</T>
          <T fontSize="15" fontWeight="500" fill="#854F0B" x="614" y="68" textAnchor="middle">{fmt(p.staff)}</T>
          <T fontSize="10" fill="#854F0B" x="614" y="80" textAnchor="middle">txns</T>
          <T fontSize="11" fill="#D4BA8A" x="690" y="68" textAnchor="middle">{fmt(p.staffItems)}</T>
          <T fontSize="10" fill="#D4BA8A" x="690" y="80" textAnchor="middle">items</T>

          <rect x="568" y="102" width="168" height="76" rx="8" fill="#E1F5EE" stroke="#1D9E75" strokeWidth="2"/>
          <T fontSize="11" fontWeight="500" fill="#085041" x="652" y="120" textAnchor="middle">Customer rescan</T>
          <T fontSize="10" fill="#0F6E56" x="652" y="134" textAnchor="middle">{pCust} of flagged txns</T>
          <T fontSize="15" fontWeight="500" fill="#0F6E56" x="614" y="156" textAnchor="middle">{fmt(p.cust)}</T>
          <T fontSize="10" fill="#0F6E56" x="614" y="168" textAnchor="middle">txns</T>
          <T fontSize="11" fill="#8AC4B4" x="690" y="156" textAnchor="middle">{fmt(p.custItems)}</T>
          <T fontSize="10" fill="#8AC4B4" x="690" y="168" textAnchor="middle">items</T>

          <rect x="568" y="190" width="168" height="60" rx="6" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1"/>
          <T fontSize="11" fontWeight="500" fill="#791F1F" x="652" y="208" textAnchor="middle">No intervention</T>
          <T fontSize="10" fill="#A32D2D" x="652" y="222" textAnchor="middle">{pNone} of flagged txns</T>
          <T fontSize="13" fontWeight="500" fill="#A32D2D" x="614" y="242" textAnchor="middle">{fmt(p.none)}</T>
          <T fontSize="10" fill="#A32D2D" x="614" y="252" textAnchor="middle">txns</T>
          <T fontSize="11" fill="#D4AEAE" x="690" y="242" textAnchor="middle">{fmt(p.noneItems)}</T>
          <T fontSize="10" fill="#D4AEAE" x="690" y="252" textAnchor="middle">items</T>

          <path d="M736 18 C776 18 776 22 810 22 L810 162 C776 162 776 154 736 148" fill="#EAF3DE" stroke="#97C459" strokeWidth="1.5"/>
          <path d="M736 196 C776 196 776 188 810 188 L810 222 C776 222 776 226 736 242" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1"/>

          <rect x="810" y="14" width="76" height="162" rx="6" fill="#EAF3DE" stroke="#639922" strokeWidth="2"/>
          <T fontSize="11" fontWeight="500" fill="#27500A" x="848" y="34" textAnchor="middle">Recovered</T>
          <T fontSize="11" fontWeight="500" fill="#27500A" x="848" y="48" textAnchor="middle">revenue</T>
          <T fontSize="13" fontWeight="500" fill="#3B6D11" x="848" y="72" textAnchor="middle">{p.rec}</T>
          <T fontSize="9" fill="#639922" x="848" y="88" textAnchor="middle">staff + customer rescan</T>
          <T fontSize="13" fontWeight="500" fill="#3B6D11" x="828" y="114" textAnchor="middle">{fmt(p.recTxns)}</T>
          <T fontSize="10" fill="#639922" x="828" y="126" textAnchor="middle">txns</T>
          <T fontSize="11" fill="#97C459" x="864" y="114" textAnchor="middle">{fmt(p.recItems)}</T>
          <T fontSize="10" fill="#97C459" x="864" y="126" textAnchor="middle">items</T>

          <rect x="810" y="184" width="76" height="66" rx="6" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1"/>
          <T fontSize="10" fontWeight="500" fill="#791F1F" x="848" y="202" textAnchor="middle">At risk</T>
          <T fontSize="12" fontWeight="500" fill="#A32D2D" x="848" y="220" textAnchor="middle">{p.risk}</T>
          <T fontSize="11" fontWeight="500" fill="#A32D2D" x="828" y="238" textAnchor="middle">{fmt(p.none)}</T>
          <T fontSize="10" fill="#A32D2D" x="828" y="248" textAnchor="middle">txns</T>
          <T fontSize="10" fill="#D4AEAE" x="864" y="238" textAnchor="middle">{fmt(p.noneItems)}</T>
          <T fontSize="10" fill="#D4AEAE" x="864" y="248" textAnchor="middle">items</T>

          {[["① Volume", 78], ["② AI detection", 356], ["③ Response", 652], ["④ $", 848]].map(([l, x]) => (
            <T key={l} fontSize="11" fill="#5F5E5A" x={x} y="388" textAnchor="middle">{l}</T>
          ))}
        </svg>
      </div>

      <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>AI insights</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
        <div style={{ borderRadius: 8, padding: "12px 14px", borderLeft: "3px solid #639922", background: "#EAF3DE" }}>
          <div style={{ fontSize: 10, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "#3B6D11", marginBottom: 5 }}>What AI recovered</div>
          <div style={{ fontSize: 12, lineHeight: 1.6, color: "#27500A" }}>
            Staff and customer rescans together recovered <strong>{p.rec}</strong> in {p.short} — across <strong>{fmt(p.recTxns)} transactions</strong> and {fmt(p.recItems)} items flagged by AI. That's revenue that would otherwise have walked out the door undetected.
          </div>
        </div>
        <div style={{ borderRadius: 8, padding: "12px 14px", borderLeft: "3px solid #BA7517", background: "#FAEEDA" }}>
          <div style={{ fontSize: 10, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "#854F0B", marginBottom: 5 }}>Opportunity ahead</div>
          <div style={{ fontSize: 12, lineHeight: 1.6, color: "#633806" }}>
            <strong>{pNone} of flagged transactions</strong> ({fmt(p.none)} txns) had no follow-up action. Closing this gap could unlock an estimated <strong>{annualRec} in additional annual recovery</strong> for this store — without adding any new hardware.
          </div>
        </div>
      </div>

      <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>Key metrics</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,minmax(0,1fr))", gap: 10, marginBottom: 12 }}>
        <KpiCard cls="r"  lbl="Scan-miss rate"    val={pct(p.flag, p.total)}             sub={fmt(p.flag) + " txns · " + fmt(p.flagItems) + " items"} />
        <KpiCard cls="gr" lbl="Rescan rate"        val={pct(p.flag - p.none, p.flag)}     sub={fmt(p.flag - p.none) + " txns rescanned by staff & customer"} />
        <KpiCard cls="gr" lbl="Revenue recovered"  val={p.rec}                            sub={p.short + " · avg $" + (parseInt(p.rec.replace(/[$,]/g,"")) / (p.flag - p.none)).toFixed(2) + " / incident"} />
        <KpiCard cls="a"  lbl="Revenue at risk"    val={p.risk}                           sub={fmt(p.none) + " unresolved txns · " + pNone + " of flagged"} />
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: "0.5px solid rgba(0,0,0,0.1)", paddingTop: 8 }}>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
          {[["#C4C2BB","Normal flow"],["#A32D2D","AI-flagged"],["#854F0B","Staff rescan"],["#0F6E56","Customer rescan"],["#3B6D11","Recovered revenue"]].map(([c, l]) => (
            <LegDot key={l} color={c} label={l} />
          ))}
        </div>
        <div style={{ fontSize: 11, color: "#888780", whiteSpace: "nowrap" }}>Powered by <strong>Vision AI</strong> · {p.short}</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Dashboard />);
</script>
</body>
</html>
