<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCO Vision AI — Scan Integrity Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0ede8; min-height: 100vh; display: flex; justify-content: center; padding: 24px 16px; }
  #root { width: 100%; max-width: 1100px; }
  select { font-family: inherit; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── Layout constants (mockup v7) ───────────────────────────────────
// viewBox: 940 × 540
//
// Col1:  x=14  y=30  w=100  h=400  bottom=430   (drawn AFTER flows to sit on top)
// Col2 red:   x=174 y=50  w=180  h=280  bottom=330
// Col2 grey:  x=174 y=360 w=180  h=90   bottom=450
//
// col1→col2 flows (special tilted paths, NOT sankeyPath):
//   Red:  left top=30  bottom=310  right top=50  bottom=330   (right edge x=174, flush with col2)
//   Grey: left top=340 bottom=430  right top=360 bottom=450
//
// col2→col3 flows (left edge x=354, right edge x=424):
//   Left bands proportional to p.flag:
//     Staff: y = 50  … 50 + 280*(staff/flag)
//     Cust:  y = staffBottom … staffBottom + 280*(cust/flag)
//     None:  y = custBottom  … 330
//   Right bands = col3 card positions:
//     Staff: y=85  … 235
//     Cust:  y=245 … 355
//     None:  y=365 … 465
//
// Col3 Staff:   x=424 y=85  w=182 h=150  bottom=235
// Col3 Cust:    x=424 y=245 w=182 h=110  bottom=355
// Col3 None:    x=424 y=365 w=182 h=100  bottom=465
//
// col3→col4 flows (left edge x=606, right edge x=666):
//   Green (staff+cust): left y=85–355,  right y=105–320
//   Red   (none):       left y=365–465, right y=345–460
//
// Col4 green: x=666 y=105 w=160 h=215  bottom=320  center=746
// Col4 red:   x=666 y=345 w=160 h=115  bottom=460  center=746
// ──────────────────────────────────────────────────────────────────

const STORES = {
  s1: { name: "Downtown Store", sco: 4, periods: {
    q1: { txn: "1,240", items: "4,650", sales: "$18,400" },
    q2: { txn: "1,310", items: "4,890", sales: "$19,200" },
    q3: { txn: "1,380", items: "5,120", sales: "$20,100" },
    q4: { txn: "1,190", items: "4,420", sales: "$17,600" },
  }},
  s2: { name: "Westside Store", sco: 6, periods: {
    q1: { txn: "1,880", items: "6,920", sales: "$27,100" },
    q2: { txn: "1,960", items: "7,180", sales: "$28,400" },
    q3: { txn: "2,040", items: "7,510", sales: "$29,800" },
    q4: { txn: "1,820", items: "6,700", sales: "$26,200" },
  }},
  s3: { name: "Eastgate Store", sco: 3, periods: {
    q1: { txn: "890",   items: "3,280", sales: "$13,600" },
    q2: { txn: "940",   items: "3,450", sales: "$14,200" },
    q3: { txn: "980",   items: "3,610", sales: "$14,900" },
    q4: { txn: "860",   items: "3,160", sales: "$13,100" },
  }},
};

const PERIODS = {
  q1: { label: "Jan 1 – Mar 31, 2025 · Q1 2025", short: "Q1 2025",
        total: 113840, normal: 110185, normalItems: 418703, flag: 3655, flagItems: 10840,
        staff: 1758, staffItems: 5210, cust: 1166, custItems: 3470,
        none: 731, noneItems: 2160, rec: "$42,680", risk: "$10,672", recTxns: 2924, recItems: 8680,
        qtlySales: 1656000 },
  q2: { label: "Apr 1 – Jun 30, 2025 · Q2 2025", short: "Q2 2025",
        total: 118400, normal: 114460, normalItems: 434948, flag: 3940, flagItems: 11820,
        staff: 1930, staffItems: 5740, cust: 1240, custItems: 3680,
        none: 770, noneItems: 2400, rec: "$46,200", risk: "$11,340", recTxns: 3170, recItems: 9420,
        qtlySales: 1728000 },
  q3: { label: "Jul 1 – Sep 30, 2025 · Q3 2025", short: "Q3 2025",
        total: 121600, normal: 117540, normalItems: 446652, flag: 4060, flagItems: 12180,
        staff: 1980, staffItems: 5900, cust: 1310, custItems: 3890,
        none: 770, noneItems: 2390, rec: "$48,720", risk: "$11,550", recTxns: 3290, recItems: 9790,
        qtlySales: 1809000 },
  q4: { label: "Oct 1 – Dec 31, 2025 · Q4 2025", short: "Q4 2025",
        total: 109200, normal: 105540, normalItems: 401052, flag: 3660, flagItems: 10980,
        staff: 1740, staffItems: 5180, cust: 1160, custItems: 3440,
        none: 760, noneItems: 2360, rec: "$41,280", risk: "$10,830", recTxns: 2900, recItems: 8620,
        qtlySales: 1584000 },
};

const fmt = n => n.toLocaleString();
const pct = (a, b) => (a / b * 100).toFixed(1) + "%";
const T = ({ children, ...p }) => (
  <text fontFamily="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" {...p}>{children}</text>
);

const KpiCard = ({ cls, lbl, val, sub }) => {
  const colors = {
    r:  { bg: "#FCEBEB", border: "#F7C1C1", lbl: "#A32D2D", val: "#A32D2D", sub: "#A32D2D" },
    a:  { bg: "#FAEEDA", border: "#FAC775", lbl: "#854F0B", val: "#854F0B", sub: "#854F0B" },
    gr: { bg: "#EAF3DE", border: "#C0DD97", lbl: "#3B6D11", val: "#3B6D11", sub: "#3B6D11" },
    g:  { bg: "#f5f4f0", border: "rgba(0,0,0,0.12)", lbl: "#888780", val: "#1a1a18", sub: "#888780" },
  }[cls];
  return (
    <div style={{ borderRadius: 8, padding: "12px 14px", border: `0.5px solid ${colors.border}`, background: colors.bg }}>
      <div style={{ fontSize: 11, color: colors.lbl, marginBottom: 3 }}>{lbl}</div>
      <div style={{ fontSize: 20, fontWeight: 500, color: colors.val }}>{val}</div>
      <div style={{ fontSize: 11, color: colors.sub, marginTop: 2 }}>{sub}</div>
    </div>
  );
};

const LegDot = ({ color, label }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "#5f5e5a" }}>
    <div style={{ width: 10, height: 10, borderRadius: 2, background: color, flexShrink: 0 }} />
    {label}
  </div>
);

// Standard sankey path for col2→col3 and col3→col4
const sankeyPath = (lx, lyt, lyb, rx, ryt, ryb) => {
  const mx = (lx + rx) / 2;
  return [
    `M${lx} ${lyt}`,
    `C${mx} ${lyt} ${mx} ${ryt} ${rx} ${ryt}`,
    `L${rx} ${ryb}`,
    `C${mx} ${ryb} ${mx} ${lyb} ${lx} ${lyb}`,
    "Z"
  ].join(" ");
};

function Dashboard() {
  const [sk, setSk] = useState("s1");
  const [pk, setPk] = useState("q1");
  const s = STORES[sk], p = PERIODS[pk];
  const pStaff = pct(p.staff, p.flag);
  const pCust  = pct(p.cust,  p.flag);
  const pNone  = pct(p.none,  p.flag);
  const recPct  = (parseInt(p.rec.replace(/[$,]/g,""))  / p.qtlySales * 100).toFixed(1) + "%";
  const riskPct = (parseInt(p.risk.replace(/[$,]/g,"")) / p.qtlySales * 100).toFixed(1) + "%";

  // ── col2→col3: left bands proportional to flag, within col2 red card y=50 h=280
  const c2Top = 50, c2H = 280;
  const staffH = c2H * (p.staff / p.flag);
  const custH  = c2H * (p.cust  / p.flag);
  const s2_staffT = c2Top,              s2_staffB = c2Top + staffH;
  const s2_custT  = s2_staffB,          s2_custB  = s2_staffB + custH;
  const s2_noneT  = s2_custB,           s2_noneB  = c2Top + c2H; // =330

  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: "22px 26px 20px", boxShadow: "0 1px 4px rgba(0,0,0,0.08)", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>

      {/* ── filters ── */}
      <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 11, color: "#888780" }}>Time period</span>
          <select value={pk} onChange={e => setPk(e.target.value)}
            style={{ fontSize: 12, padding: "5px 10px", border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 6, background: "#fff", color: "#1a1a18", cursor: "pointer" }}>
            <option value="q1">Q1 2025 (Jan – Mar)</option>
            <option value="q2">Q2 2025 (Apr – Jun)</option>
            <option value="q3">Q3 2025 (Jul – Sep)</option>
            <option value="q4">Q4 2025 (Oct – Dec)</option>
          </select>
        </div>
        <div style={{ width: 0.5, height: 20, background: "rgba(0,0,0,0.12)" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 11, color: "#888780" }}>Store</span>
          <select value={sk} onChange={e => setSk(e.target.value)}
            style={{ fontSize: 12, padding: "5px 10px", border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 6, background: "#fff", color: "#1a1a18", cursor: "pointer" }}>
            <option value="s1">Downtown Store</option>
            <option value="s2">Westside Store</option>
            <option value="s3">Eastgate Store</option>
          </select>
        </div>
      </div>

      {/* ── summary bar ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, gap: 16 }}>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          {[["SCO lanes", s.sco + " units"],
            ["Quarterly transactions", fmt(p.total) + " txns"],
            ["Quarterly items scanned", fmt(p.normalItems + p.flagItems) + " items"],
            ["Quarterly total sales", "$" + p.qtlySales.toLocaleString()]
          ].map(([l, v]) => (
            <div key={l} style={{ background: "#f5f4f0", border: "0.5px solid rgba(0,0,0,0.1)", borderRadius: 8, padding: "7px 14px" }}>
              <div style={{ fontSize: 11, color: "#888780", marginBottom: 2 }}>{l}</div>
              <div style={{ fontSize: 14, fontWeight: 500, color: "#1a1a18" }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ textAlign: "right", flexShrink: 0 }}>
          <div style={{ fontSize: 15, fontWeight: 500, color: "#1a1a18" }}>{s.name}</div>
          <div style={{ fontSize: 11, color: "#888780", marginTop: 2 }}>{p.label}</div>
          <button style={{ marginTop: 6, fontSize: 11, padding: "4px 11px", border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 6, background: "#fff", color: "#888780", cursor: "pointer" }}>
            Export report ↓
          </button>
        </div>
      </div>

      <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>
        Transaction integrity flow — AI scan miss detection
      </div>

      <div style={{ background: "#fff", border: "0.5px solid rgba(0,0,0,0.1)", borderRadius: 12, padding: "14px 16px 10px", marginBottom: 12 }}>
        <svg width="100%" viewBox="0 0 940 540" style={{ display: "block" }}>

          {/* column headers */}
          <T fontSize="10" fill="#B4B2A9" x="64"  y="18" textAnchor="middle">① Volume</T>
          <T fontSize="10" fill="#B4B2A9" x="264" y="18" textAnchor="middle">② AI detection</T>
          <T fontSize="10" fill="#B4B2A9" x="515" y="18" textAnchor="middle">③ Response</T>
          <T fontSize="10" fill="#B4B2A9" x="746" y="18" textAnchor="middle">④ $</T>

          {/* ── col1→col2 flows drawn FIRST (col1 card renders on top) ── */}

          {/* Red flow: tilted left→right, right edge flush with col2 card (x=174)
              Left:  top=30  bottom=310  (20px above right edge → downward tilt)
              Right: top=50  bottom=330  (col2 red card exact bounds) */}
          <path
            d={`M114 30 C148 30 148 50 174 50 L174 330 C148 330 148 310 114 310 Z`}
            fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"
          />

          {/* Grey flow: tilted left→right, right edge flush with col2 grey card (x=174)
              Left:  top=340 bottom=430
              Right: top=360 bottom=450  (col2 grey card exact bounds) */}
          <path
            d={`M114 340 C148 340 148 360 174 360 L174 450 C148 450 148 430 114 430 Z`}
            fill="#ECEAE4" stroke="#D3D1C7" strokeWidth="0.5"
          />

          {/* ── Col1 drawn ON TOP of flows ──
              x=14 y=30 w=100 h=400 bottom=430 */}
          <rect x="14" y="30" width="100" height="400" rx="8" fill="#DEDAD4" stroke="#C8C5BE" strokeWidth="0.5"/>
          <T fontSize="11" fill="#6B6966" x="64" y="76"  textAnchor="middle">Total SCO</T>
          <T fontSize="11" fill="#6B6966" x="64" y="90"  textAnchor="middle">transactions</T>
          <T fontSize="19" fontWeight="500" fill="#3d3d3a" x="64" y="138" textAnchor="middle">{fmt(p.total)}</T>
          <T fontSize="10" fill="#9c9a92" x="64" y="154" textAnchor="middle">{p.short} total</T>

          {/* ── Col2 AI-flagged: x=174 y=50 w=180 h=280 bottom=330 ── */}
          <rect x="174" y="50" width="180" height="280" rx="8" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>
          <T fontSize="10" fontWeight="500" fill="#791F1F" x="264" y="72"  textAnchor="middle">AI-flagged scan miss</T>
          <line x1="186" y1="80" x2="342" y2="80" stroke="#F09595" strokeWidth="0.5"/>
          {/* txns group: upper half of card (~y=155) */}
          <T fontSize="13" fontWeight="500" fill="#A32D2D" x="204" y="155" textAnchor="middle">{fmt(p.flag)}</T>
          <T fontSize="9"  fill="#A32D2D"               x="204" y="169" textAnchor="middle">txns</T>
          <T fontSize="9"  fill="#A32D2D"               x="342" y="155" textAnchor="end">{pct(p.flag, p.total)} of total</T>
          {/* items group: lower half of card (~y=255) */}
          <T fontSize="10" fontWeight="500" fill="#C4785A" x="204" y="255" textAnchor="middle">{fmt(p.flagItems)}</T>
          <T fontSize="8"  fill="#C4785A"               x="204" y="269" textAnchor="middle">items</T>
          <T fontSize="8"  fill="#C4785A"               x="342" y="255" textAnchor="end">{pct(p.flagItems, p.normalItems + p.flagItems)} of total</T>

          {/* ── Col2 Normal: x=174 y=360 w=180 h=90 bottom=450 ── */}
          <rect x="174" y="360" width="180" height="90" rx="8" fill="#F5F4F0" stroke="#D3D1C7" strokeWidth="0.5"/>
          <T fontSize="10" fill="#888780" x="264" y="380" textAnchor="middle">Normal transactions</T>
          <line x1="186" y1="388" x2="342" y2="388" stroke="#D3D1C7" strokeWidth="0.5"/>
          <T fontSize="12" fontWeight="500" fill="#888780" x="204" y="406" textAnchor="middle">{fmt(p.normal)}</T>
          <T fontSize="9"  fill="#888780"               x="204" y="418" textAnchor="middle">txns</T>
          <T fontSize="9"  fill="#888780"               x="342" y="406" textAnchor="end">{pct(p.normal, p.total)} of total</T>
          <T fontSize="10" fontWeight="500" fill="#6B6966" x="204" y="430" textAnchor="middle">{fmt(p.normalItems)}</T>
          <T fontSize="8"  fill="#6B6966"               x="204" y="441" textAnchor="middle">items</T>
          <T fontSize="8"  fill="#6B6966"               x="342" y="430" textAnchor="end">{pct(p.normalItems, p.normalItems + p.flagItems)} of total</T>

          {/* ── col2→col3 Sankey flows ──
              Left edge x=354, bands proportional within col2 red card (y=50 h=280)
              Right edge x=424, bands = col3 card exact top/bottom
              Staff → y=85–235, Cust → y=245–355, None → y=365–465 */}
          <path d={sankeyPath(354, s2_staffT, s2_staffB, 424, 85,  235)}
                fill="#FAEEDA" stroke="#EF9F27" strokeWidth="1.5"/>
          <path d={sankeyPath(354, s2_custT,  s2_custB,  424, 245, 355)}
                fill="#E1F5EE" stroke="#1D9E75" strokeWidth="1.5"/>
          <path d={sankeyPath(354, s2_noneT,  s2_noneB,  424, 365, 465)}
                fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>

          {/* ── Col3 Staff rescan: x=424 y=85 w=182 h=150 bottom=235 ── */}
          <rect x="424" y="85" width="182" height="150" rx="8" fill="#FAEEDA" stroke="#EF9F27" strokeWidth="1.5"/>
          <T fontSize="10" fontWeight="500" fill="#633806" x="515" y="106" textAnchor="middle">Staff rescan</T>
          <line x1="436" y1="114" x2="594" y2="114" stroke="#FAC775" strokeWidth="0.5"/>
          {/* txns: upper, items: lower — spread across card height */}
          <T fontSize="12" fontWeight="500" fill="#854F0B" x="452" y="148" textAnchor="middle">{fmt(p.staff)}</T>
          <T fontSize="9"  fill="#854F0B"               x="452" y="160" textAnchor="middle">txns</T>
          <T fontSize="9"  fill="#854F0B"               x="594" y="148" textAnchor="end">{pStaff} of flagged</T>
          <T fontSize="10" fontWeight="500" fill="#BA7517" x="452" y="200" textAnchor="middle">{fmt(p.staffItems)}</T>
          <T fontSize="8"  fill="#BA7517"               x="452" y="212" textAnchor="middle">items</T>
          <T fontSize="8"  fill="#BA7517"               x="594" y="200" textAnchor="end">{pct(p.staffItems, p.flagItems)} of flagged</T>

          {/* ── Col3 Customer rescan: x=424 y=245 w=182 h=110 bottom=355 ── */}
          <rect x="424" y="245" width="182" height="110" rx="8" fill="#E1F5EE" stroke="#1D9E75" strokeWidth="1.5"/>
          <T fontSize="10" fontWeight="500" fill="#085041" x="515" y="264" textAnchor="middle">Customer rescan</T>
          <line x1="436" y1="272" x2="594" y2="272" stroke="#9FE1CB" strokeWidth="0.5"/>
          <T fontSize="12" fontWeight="500" fill="#0F6E56" x="452" y="290" textAnchor="middle">{fmt(p.cust)}</T>
          <T fontSize="9"  fill="#0F6E56"               x="452" y="302" textAnchor="middle">txns</T>
          <T fontSize="9"  fill="#0F6E56"               x="594" y="290" textAnchor="end">{pCust} of flagged</T>
          <T fontSize="10" fontWeight="500" fill="#1D9E75" x="452" y="316" textAnchor="middle">{fmt(p.custItems)}</T>
          <T fontSize="8"  fill="#1D9E75"               x="452" y="327" textAnchor="middle">items</T>
          <T fontSize="8"  fill="#1D9E75"               x="594" y="316" textAnchor="end">{pct(p.custItems, p.flagItems)} of flagged</T>

          {/* ── Col3 No intervention: x=424 y=365 w=182 h=100 bottom=465 ── */}
          <rect x="424" y="365" width="182" height="100" rx="6" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>
          <T fontSize="10" fontWeight="500" fill="#791F1F" x="515" y="384" textAnchor="middle">No intervention</T>
          <line x1="436" y1="392" x2="594" y2="392" stroke="#F09595" strokeWidth="0.5"/>
          <T fontSize="12" fontWeight="500" fill="#A32D2D" x="452" y="410" textAnchor="middle">{fmt(p.none)}</T>
          <T fontSize="9"  fill="#A32D2D"               x="452" y="422" textAnchor="middle">txns</T>
          <T fontSize="9"  fill="#A32D2D"               x="594" y="410" textAnchor="end">{pNone} of flagged</T>
          <T fontSize="10" fontWeight="500" fill="#C4785A" x="452" y="436" textAnchor="middle">{fmt(p.noneItems)}</T>
          <T fontSize="8"  fill="#C4785A"               x="452" y="447" textAnchor="middle">items</T>
          <T fontSize="8"  fill="#C4785A"               x="594" y="436" textAnchor="end">{pct(p.noneItems, p.flagItems)} of flagged</T>

          {/* ── col3→col4 Sankey flows ──
              Left edge x=606:
                Green (staff+cust): y=85–355
                Red   (none):       y=365–465
              Right edge x=666:
                Green tgt: y=105–320  (col4 green card)
                Red   tgt: y=345–460  (col4 red card) */}
          <path d={sankeyPath(606, 85,  355, 666, 105, 320)}
                fill="#EAF3DE" stroke="#97C459" strokeWidth="1.5"/>
          <path d={sankeyPath(606, 365, 465, 666, 345, 460)}
                fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>

          {/* ── Col4 Recovered revenue: x=666 y=105 w=160 h=215 bottom=320 center=746 ── */}
          <rect x="666" y="105" width="160" height="215" rx="6" fill="#EAF3DE" stroke="#639922" strokeWidth="1.5"/>
          <T fontSize="10" fontWeight="500" fill="#27500A" x="746" y="126" textAnchor="middle">Recovered revenue</T>
          <T fontSize="9"  fill="#639922"               x="746" y="139" textAnchor="middle">{recPct} of quarterly sales</T>
          <T fontSize="13" fontWeight="500" fill="#3B6D11" x="746" y="162" textAnchor="middle">{p.rec}</T>
          <line x1="678" y1="172" x2="814" y2="172" stroke="#97C459" strokeWidth="0.5"/>
          {/* txns left, items right */}
          <T fontSize="12" fontWeight="500" fill="#3B6D11" x="686" y="192" textAnchor="start">{fmt(p.recTxns)}</T>
          <T fontSize="9"  fill="#639922"               x="686" y="204" textAnchor="start">txns</T>
          <T fontSize="10" fontWeight="500" fill="#639922" x="814" y="192" textAnchor="end">{fmt(p.recItems)}</T>
          <T fontSize="8"  fill="#639922"               x="814" y="204" textAnchor="end">items</T>

          {/* ── Col4 At risk: x=666 y=345 w=160 h=115 bottom=460 center=746 ── */}
          <rect x="666" y="345" width="160" height="115" rx="6" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1"/>
          <T fontSize="10" fontWeight="500" fill="#791F1F" x="746" y="364" textAnchor="middle">At risk</T>
          <T fontSize="9"  fill="#A32D2D"               x="746" y="376" textAnchor="middle">{riskPct} of quarterly sales</T>
          <T fontSize="12" fontWeight="500" fill="#A32D2D" x="746" y="396" textAnchor="middle">{p.risk}</T>
          <line x1="678" y1="406" x2="814" y2="406" stroke="#F09595" strokeWidth="0.5"/>
          {/* txns left, items right */}
          <T fontSize="11" fontWeight="500" fill="#A32D2D" x="686" y="422" textAnchor="start">{fmt(p.none)}</T>
          <T fontSize="9"  fill="#A32D2D"               x="686" y="434" textAnchor="start">txns</T>
          <T fontSize="10" fontWeight="500" fill="#C4785A" x="814" y="422" textAnchor="end">{fmt(p.noneItems)}</T>
          <T fontSize="8"  fill="#C4785A"               x="814" y="434" textAnchor="end">items</T>

        </svg>
      </div>

      {/* ── AI insights ── */}
      <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>AI insights</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
        <div style={{ borderRadius: 8, padding: "12px 14px", borderLeft: "3px solid #639922", background: "#EAF3DE" }}>
          <div style={{ fontSize: 10, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "#3B6D11", marginBottom: 5 }}>What AI recovered</div>
          <div style={{ fontSize: 12, lineHeight: 1.6, color: "#27500A" }}>
            Staff and customer rescans together recovered <strong>{p.rec}</strong> in {p.short} — across <strong>{fmt(p.recTxns)} transactions</strong> and {fmt(p.recItems)} items flagged by AI. That's revenue that would otherwise have walked out the door undetected.
          </div>
        </div>
        <div style={{ borderRadius: 8, padding: "12px 14px", borderLeft: "3px solid #BA7517", background: "#FAEEDA" }}>
          <div style={{ fontSize: 10, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "#854F0B", marginBottom: 5 }}>Opportunity ahead</div>
          <div style={{ fontSize: 12, lineHeight: 1.6, color: "#633806" }}>
            <strong>{pNone} of flagged transactions</strong> ({fmt(p.none)} txns) had no follow-up action. Closing this gap could unlock an estimated <strong>${Math.round(parseInt(p.rec.replace(/[$,]/g,"")) * p.none / p.recTxns).toLocaleString()}+ in additional quarterly recovery</strong> for this store — without adding any new hardware.
          </div>
        </div>
      </div>

      {/* ── Key metrics ── */}
      <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>Key metrics</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,minmax(0,1fr))", gap: 10, marginBottom: 12 }}>
        <KpiCard cls="r"  lbl="Scan-miss rate"   val={pct(p.flag, p.total)}          sub={fmt(p.flag) + " txns · " + fmt(p.flagItems) + " items"} />
        <KpiCard cls="gr" lbl="Rescan rate"       val={pct(p.flag-p.none, p.flag)}    sub={fmt(p.flag-p.none) + " txns rescanned by staff & customer"} />
        <KpiCard cls="gr" lbl="Revenue recovered" val={p.rec}                         sub={p.short + " · avg $" + (parseInt(p.rec.replace(/[$,]/g,"")) / (p.flag-p.none)).toFixed(2) + " / incident"} />
        <KpiCard cls="a"  lbl="Revenue at risk"   val={p.risk}                        sub={fmt(p.none) + " unresolved txns · " + pNone + " of flagged"} />
      </div>

      {/* ── Legend ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: "0.5px solid rgba(0,0,0,0.1)", paddingTop: 8 }}>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
          {[["#C4C2BB","Normal flow"],["#A32D2D","AI-flagged"],["#854F0B","Staff rescan"],["#0F6E56","Customer rescan"],["#3B6D11","Recovered revenue"]].map(([c, l]) => (
            <LegDot key={l} color={c} label={l} />
          ))}
        </div>
        <div style={{ fontSize: 11, color: "#888780", whiteSpace: "nowrap" }}>Powered by <strong>Vision AI</strong> · {p.short}</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Dashboard />);
</script>
</body>
</html>
