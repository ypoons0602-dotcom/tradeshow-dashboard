<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCO Vision AI — Scan Integrity Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0ede8; min-height: 100vh; display: flex; justify-content: center; padding: 24px 16px; }
  #root { width: 100%; max-width: 1100px; }
  select { font-family: inherit; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const STORES = {
  s1: { name: "Store Alpha", sco: 4, periods: {
    q1: { txn: "1,240", items: "4,650", sales: "$18,400" },
    q2: { txn: "1,310", items: "4,890", sales: "$19,200" },
    q3: { txn: "1,380", items: "5,120", sales: "$20,100" },
    q4: { txn: "1,190", items: "4,420", sales: "$17,600" },
  }},
  s2: { name: "Store Beta", sco: 6, periods: {
    q1: { txn: "1,880", items: "6,920", sales: "$27,100" },
    q2: { txn: "1,960", items: "7,180", sales: "$28,400" },
    q3: { txn: "2,040", items: "7,510", sales: "$29,800" },
    q4: { txn: "1,820", items: "6,700", sales: "$26,200" },
  }},
  s3: { name: "Store Gamma", sco: 3, periods: {
    q1: { txn: "890",   items: "3,280", sales: "$13,600" },
    q2: { txn: "940",   items: "3,450", sales: "$14,200" },
    q3: { txn: "980",   items: "3,610", sales: "$14,900" },
    q4: { txn: "860",   items: "3,160", sales: "$13,100" },
  }},
};

const PERIODS = {
  q1: { label: "Jan 1 – Mar 31, 2025 · Q1 2025", short: "Q1 2025",
        total: 113840, normal: 110185, normalItems: 418703, flag: 3655, flagItems: 10840,
        staff: 1758, staffItems: 5210, cust: 1166, custItems: 3470,
        none: 731, noneItems: 2160, rec: "$42,680", risk: "$10,672", recTxns: 2924, recItems: 8680 },
  q2: { label: "Apr 1 – Jun 30, 2025 · Q2 2025", short: "Q2 2025",
        total: 118400, normal: 114460, normalItems: 434948, flag: 3940, flagItems: 11820,
        staff: 1930, staffItems: 5740, cust: 1240, custItems: 3680,
        none: 770, noneItems: 2400, rec: "$46,200", risk: "$11,340", recTxns: 3170, recItems: 9420 },
  q3: { label: "Jul 1 – Sep 30, 2025 · Q3 2025", short: "Q3 2025",
        total: 121600, normal: 117540, normalItems: 446652, flag: 4060, flagItems: 12180,
        staff: 1980, staffItems: 5900, cust: 1310, custItems: 3890,
        none: 770, noneItems: 2390, rec: "$48,720", risk: "$11,550", recTxns: 3290, recItems: 9790 },
  q4: { label: "Oct 1 – Dec 31, 2025 · Q4 2025", short: "Q4 2025",
        total: 109200, normal: 105540, normalItems: 401052, flag: 3660, flagItems: 10980,
        staff: 1740, staffItems: 5180, cust: 1160, custItems: 3440,
        none: 760, noneItems: 2360, rec: "$41,280", risk: "$10,830", recTxns: 2900, recItems: 8620 },
};

const fmt = n => n.toLocaleString();
const pct = (a, b) => (a / b * 100).toFixed(1) + "%";
const T = ({ children, ...p }) => (
  <text fontFamily="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" {...p}>{children}</text>
);

const KpiCard = ({ cls, lbl, val, sub }) => {
  const colors = {
    r:  { bg: "#FCEBEB", border: "#F7C1C1", lbl: "#A32D2D", val: "#A32D2D", sub: "#A32D2D" },
    a:  { bg: "#FAEEDA", border: "#FAC775", lbl: "#854F0B", val: "#854F0B", sub: "#854F0B" },
    gr: { bg: "#EAF3DE", border: "#C0DD97", lbl: "#3B6D11", val: "#3B6D11", sub: "#3B6D11" },
    g:  { bg: "#f5f4f0", border: "rgba(0,0,0,0.12)", lbl: "#888780", val: "#1a1a18", sub: "#888780" },
  }[cls];
  return (
    <div style={{ borderRadius: 8, padding: "12px 14px", border: `0.5px solid ${colors.border}`, background: colors.bg }}>
      <div style={{ fontSize: 11, color: colors.lbl, marginBottom: 3 }}>{lbl}</div>
      <div style={{ fontSize: 20, fontWeight: 500, color: colors.val }}>{val}</div>
      <div style={{ fontSize: 11, color: colors.sub, marginTop: 2 }}>{sub}</div>
    </div>
  );
};

const LegDot = ({ color, label }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "#5f5e5a" }}>
    <div style={{ width: 10, height: 10, borderRadius: 2, background: color, flexShrink: 0 }} />
    {label}
  </div>
);

function Dashboard() {
  const [sk, setSk] = useState("s1");
  const [pk, setPk] = useState("q1");
  const s = STORES[sk], sp = s.periods[pk], p = PERIODS[pk];
  const pStaff = pct(p.staff, p.flag);
  const pCust  = pct(p.cust,  p.flag);
  const pNone  = pct(p.none,  p.flag);
  const annualRec = "$" + (parseInt(p.rec.replace(/[$,]/g, "")) * 4).toLocaleString() + "+";

  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: "22px 26px 20px", boxShadow: "0 1px 4px rgba(0,0,0,0.08)", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>

      <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 11, color: "#888780" }}>Time period</span>
          <select value={pk} onChange={e => setPk(e.target.value)}
            style={{ fontSize: 12, padding: "5px 10px", border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 6, background: "#fff", color: "#1a1a18", cursor: "pointer" }}>
            <option value="q1">Q1 2025 (Jan – Mar)</option>
            <option value="q2">Q2 2025 (Apr – Jun)</option>
            <option value="q3">Q3 2025 (Jul – Sep)</option>
            <option value="q4">Q4 2025 (Oct – Dec)</option>
          </select>
        </div>
        <div style={{ width: 0.5, height: 20, background: "rgba(0,0,0,0.12)" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 11, color: "#888780" }}>Store</span>
          <select value={sk} onChange={e => setSk(e.target.value)}
            style={{ fontSize: 12, padding: "5px 10px", border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 6, background: "#fff", color: "#1a1a18", cursor: "pointer" }}>
            <option value="s1">Store Alpha</option>
            <option value="s2">Store Beta</option>
            <option value="s3">Store Gamma</option>
          </select>
        </div>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, gap: 16 }}>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          {[["SCO lanes", s.sco + " units"], ["Daily transactions", sp.txn + " txns"], ["Daily items scanned", sp.items + " items"], ["Daily total sales", sp.sales]].map(([l, v]) => (
            <div key={l} style={{ background: "#f5f4f0", border: "0.5px solid rgba(0,0,0,0.1)", borderRadius: 8, padding: "7px 14px" }}>
              <div style={{ fontSize: 11, color: "#888780", marginBottom: 2 }}>{l}</div>
              <div style={{ fontSize: 14, fontWeight: 500, color: "#1a1a18" }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ textAlign: "right", flexShrink: 0 }}>
          <div style={{ fontSize: 15, fontWeight: 500, color: "#1a1a18" }}>{s.name}</div>
          <div style={{ fontSize: 11, color: "#888780", marginTop: 2 }}>{p.label}</div>
          <button style={{ marginTop: 6, fontSize: 11, padding: "4px 11px", border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 6, background: "#fff", color: "#888780", cursor: "pointer" }}>
            Export report ↓
          </button>
        </div>
      </div>

      <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>
        Transaction integrity flow — AI scan miss detection
      </div>

      <div style={{ background: "#fff", border: "0.5px solid rgba(0,0,0,0.1)", borderRadius: 12, padding: "14px 16px 10px", marginBottom: 12 }}>
        <svg width="100%" viewBox="0 0 900 390" style={{ display: "block" }}>

          <T fontSize="10" fill="#B4B2A9" x="78"  y="16" textAnchor="middle">① Volume</T>
          <T fontSize="10" fill="#B4B2A9" x="290" y="16" textAnchor="middle">② AI detection</T>
          <T fontSize="10" fill="#B4B2A9" x="580" y="16" textAnchor="middle">③ Response</T>
          <T fontSize="10" fill="#B4B2A9" x="845" y="16" textAnchor="middle">④ $</T>

          <path d="M142 234 C168 234 178 252 196 252 L196 304 C178 304 168 286 142 286" fill="#ECEAE4" stroke="#D3D1C7" strokeWidth="0.5"/>
          <path d="M142 36 C172 36 178 36 196 36 L196 220 C178 220 172 208 142 200 Z" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>

          <rect x="14" y="36" width="128" height="268" rx="8" fill="#DEDAD4" stroke="#C8C5BE" strokeWidth="0.5"/>
          <T fontSize="11" fill="#6B6966" x="78" y="70" textAnchor="middle">Total SCO</T>
          <T fontSize="11" fill="#6B6966" x="78" y="84" textAnchor="middle">transactions</T>
          <T fontSize="22" fontWeight="500" fill="#3d3d3a" x="78" y="124" textAnchor="middle">{fmt(p.total)}</T>
          <T fontSize="10" fill="#9c9a92" x="78" y="140" textAnchor="middle">{p.short} total</T>

          <rect x="196" y="36" width="190" height="184" rx="8" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>
          <T fontSize="11" fontWeight="500" fill="#791F1F" x="291" y="60" textAnchor="middle">AI-flagged scan miss</T>
          <T fontSize="10" fill="#C4785A" x="291" y="78" textAnchor="middle">3.2% of total txns</T>
          <T fontSize="18" fontWeight="500" fill="#A32D2D" x="252" y="120" textAnchor="middle">{fmt(p.flag)}</T>
          <T fontSize="10" fill="#A32D2D" x="252" y="134" textAnchor="middle">txns</T>
          <T fontSize="14" fill="#D4AEAE" x="330" y="120" textAnchor="middle">{fmt(p.flagItems)}</T>
          <T fontSize="10" fill="#D4AEAE" x="330" y="134" textAnchor="middle">items</T>

          <rect x="196" y="252" width="190" height="94" rx="8" fill="#F5F4F0" stroke="#D3D1C7" strokeWidth="0.5"/>
          <T fontSize="11" fill="#888780" x="291" y="270" textAnchor="middle">Normal transactions</T>
          <T fontSize="10" fill="#B4B2A9" x="291" y="284" textAnchor="middle">{pct(p.normal, p.total)} of total txns</T>
          <T fontSize="14" fontWeight="500" fill="#888780" x="252" y="308" textAnchor="middle">{fmt(p.normal)}</T>
          <T fontSize="10" fill="#B4B2A9" x="252" y="321" textAnchor="middle">txns</T>
          <T fontSize="12" fill="#C4C2BB" x="330" y="308" textAnchor="middle">{fmt(p.normalItems)}</T>
          <T fontSize="10" fill="#C4C2BB" x="330" y="321" textAnchor="middle">items</T>

          <path d="M386 42 C444 42 444 40 492 40 L492 110 C444 110 444 92 386 86" fill="#FAEEDA" stroke="#EF9F27" strokeWidth="1.5"/>
          <path d="M386 92 C444 92 444 126 492 128 L492 200 C444 200 444 132 386 122" fill="#E1F5EE" stroke="#1D9E75" strokeWidth="1.5"/>
          <path d="M386 126 C444 126 444 218 492 220 L492 294 C444 294 444 158 386 148" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>

          <rect x="492" y="36" width="182" height="78" rx="8" fill="#FAEEDA" stroke="#EF9F27" strokeWidth="1.5"/>
          <T fontSize="11" fontWeight="500" fill="#633806" x="583" y="56" textAnchor="middle">Staff rescan</T>
          <T fontSize="10" fill="#854F0B" x="583" y="70" textAnchor="middle">{pStaff} of flagged txns</T>
          <T fontSize="16" fontWeight="500" fill="#854F0B" x="544" y="96" textAnchor="middle">{fmt(p.staff)}</T>
          <T fontSize="10" fill="#854F0B" x="544" y="108" textAnchor="middle">txns</T>
          <T fontSize="12" fill="#D4BA8A" x="636" y="96" textAnchor="middle">{fmt(p.staffItems)}</T>
          <T fontSize="10" fill="#D4BA8A" x="636" y="108" textAnchor="middle">items</T>

          <rect x="492" y="124" width="182" height="78" rx="8" fill="#E1F5EE" stroke="#1D9E75" strokeWidth="1.5"/>
          <T fontSize="11" fontWeight="500" fill="#085041" x="583" y="144" textAnchor="middle">Customer rescan</T>
          <T fontSize="10" fill="#0F6E56" x="583" y="158" textAnchor="middle">{pCust} of flagged txns</T>
          <T fontSize="16" fontWeight="500" fill="#0F6E56" x="544" y="186" textAnchor="middle">{fmt(p.cust)}</T>
          <T fontSize="10" fill="#0F6E56" x="544" y="198" textAnchor="middle">txns</T>
          <T fontSize="12" fill="#8AC4B4" x="636" y="186" textAnchor="middle">{fmt(p.custItems)}</T>
          <T fontSize="10" fill="#8AC4B4" x="636" y="198" textAnchor="middle">items</T>

          <rect x="492" y="216" width="182" height="82" rx="6" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>
          <T fontSize="11" fontWeight="500" fill="#791F1F" x="583" y="236" textAnchor="middle">No intervention</T>
          <T fontSize="10" fill="#A32D2D" x="583" y="250" textAnchor="middle">{pNone} of flagged txns</T>
          <T fontSize="16" fontWeight="500" fill="#A32D2D" x="544" y="278" textAnchor="middle">{fmt(p.none)}</T>
          <T fontSize="10" fill="#A32D2D" x="544" y="290" textAnchor="middle">txns</T>
          <T fontSize="12" fill="#D4AEAE" x="636" y="278" textAnchor="middle">{fmt(p.noneItems)}</T>
          <T fontSize="10" fill="#D4AEAE" x="636" y="290" textAnchor="middle">items</T>

          <path d="M674 40 C722 40 722 36 758 36 L758 202 C722 202 722 196 674 110" fill="#EAF3DE" stroke="#97C459" strokeWidth="1.5"/>
          <path d="M674 220 C722 220 722 224 758 224 L758 360 C722 360 722 296 674 294" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1.5"/>

          <rect x="758" y="36" width="126" height="176" rx="6" fill="#EAF3DE" stroke="#639922" strokeWidth="1.5"/>
          <T fontSize="11" fontWeight="500" fill="#27500A" x="821" y="58" textAnchor="middle">Recovered</T>
          <T fontSize="11" fontWeight="500" fill="#27500A" x="821" y="72" textAnchor="middle">revenue</T>
          <T fontSize="14" fontWeight="500" fill="#3B6D11" x="821" y="100" textAnchor="middle">{p.rec}</T>
          <T fontSize="10" fill="#639922" x="821" y="118" textAnchor="middle">staff &amp; customer rescan</T>
          <T fontSize="14" fontWeight="500" fill="#3B6D11" x="821" y="148" textAnchor="middle">{fmt(p.recTxns)}</T>
          <T fontSize="10" fill="#639922" x="821" y="161" textAnchor="middle">txns</T>
          <T fontSize="12" fill="#97C459" x="821" y="178" textAnchor="middle">{fmt(p.recItems)}</T>
          <T fontSize="10" fill="#97C459" x="821" y="191" textAnchor="middle">items</T>

          <rect x="758" y="224" width="126" height="146" rx="6" fill="#FCEBEB" stroke="#E24B4A" strokeWidth="1"/>
          <T fontSize="11" fontWeight="500" fill="#791F1F" x="821" y="246" textAnchor="middle">At risk</T>
          <T fontSize="13" fontWeight="500" fill="#A32D2D" x="821" y="270" textAnchor="middle">{p.risk}</T>
          <T fontSize="13" fontWeight="500" fill="#A32D2D" x="821" y="298" textAnchor="middle">{fmt(p.none)}</T>
          <T fontSize="10" fill="#A32D2D" x="821" y="310" textAnchor="middle">txns</T>
          <T fontSize="11" fill="#D4AEAE" x="821" y="332" textAnchor="middle">{fmt(p.noneItems)}</T>
          <T fontSize="10" fill="#D4AEAE" x="821" y="344" textAnchor="middle">items</T>

        </svg>
      </div>

      <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>AI insights</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
        <div style={{ borderRadius: 8, padding: "12px 14px", borderLeft: "3px solid #639922", background: "#EAF3DE" }}>
          <div style={{ fontSize: 10, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "#3B6D11", marginBottom: 5 }}>What AI recovered</div>
          <div style={{ fontSize: 12, lineHeight: 1.6, color: "#27500A" }}>
            Staff and customer rescans together recovered <strong>{p.rec}</strong> in {p.short} — across <strong>{fmt(p.recTxns)} transactions</strong> and {fmt(p.recItems)} items flagged by AI. That's revenue that would otherwise have walked out the door undetected.
          </div>
        </div>
        <div style={{ borderRadius: 8, padding: "12px 14px", borderLeft: "3px solid #BA7517", background: "#FAEEDA" }}>
          <div style={{ fontSize: 10, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "#854F0B", marginBottom: 5 }}>Opportunity ahead</div>
          <div style={{ fontSize: 12, lineHeight: 1.6, color: "#633806" }}>
            <strong>{pNone} of flagged transactions</strong> ({fmt(p.none)} txns) had no follow-up action. Closing this gap could unlock an estimated <strong>{annualRec} in additional annual recovery</strong> for this store — without adding any new hardware.
          </div>
        </div>
      </div>

      <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>Key metrics</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,minmax(0,1fr))", gap: 10, marginBottom: 12 }}>
        <KpiCard cls="r"  lbl="Scan-miss rate"    val={pct(p.flag, p.total)}           sub={fmt(p.flag) + " txns · " + fmt(p.flagItems) + " items"} />
        <KpiCard cls="gr" lbl="Rescan rate"        val={pct(p.flag - p.none, p.flag)}   sub={fmt(p.flag - p.none) + " txns rescanned by staff & customer"} />
        <KpiCard cls="gr" lbl="Revenue recovered"  val={p.rec}                          sub={p.short + " · avg $" + (parseInt(p.rec.replace(/[$,]/g,"")) / (p.flag - p.none)).toFixed(2) + " / incident"} />
        <KpiCard cls="a"  lbl="Revenue at risk"    val={p.risk}                         sub={fmt(p.none) + " unresolved txns · " + pNone + " of flagged"} />
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: "0.5px solid rgba(0,0,0,0.1)", paddingTop: 8 }}>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
          {[["#C4C2BB","Normal flow"],["#A32D2D","AI-flagged"],["#854F0B","Staff rescan"],["#0F6E56","Customer rescan"],["#3B6D11","Recovered revenue"]].map(([c, l]) => (
            <LegDot key={l} color={c} label={l} />
          ))}
        </div>
        <div style={{ fontSize: 11, color: "#888780", whiteSpace: "nowrap" }}>Powered by <strong>Vision AI</strong> · {p.short}</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Dashboard />);
</script>
</body>
</html>
