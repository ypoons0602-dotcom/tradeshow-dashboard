<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCO Vision AI — Scan Integrity Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0ede8; min-height: 100vh; display: flex; justify-content: center; padding: 24px 16px; }
  #root { width: 100%; max-width: 1100px; }
  select, button, input { font-family: inherit; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 1000; padding: 32px 16px; overflow-y: auto;
  }
  .modal-box {
    background: #fff; border-radius: 14px; width: 100%; max-width: 960px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18); padding: 28px 28px 24px;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 18px; right: 20px;
    background: none; border: none; cursor: pointer;
    font-size: 20px; color: #888780; line-height: 1;
  }
  .modal-close:hover { color: #1a1a18; }

  /* Table */
  .tx-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tx-table th {
    text-align: left; font-size: 11px; font-weight: 500; color: #888780;
    padding: 8px 10px; border-bottom: 0.5px solid rgba(0,0,0,0.1);
    white-space: nowrap;
  }
  .tx-table td {
    padding: 10px 10px; border-bottom: 0.5px solid rgba(0,0,0,0.07);
    color: #1a1a18; vertical-align: middle;
  }
  .tx-table tr:last-child td { border-bottom: none; }
  .tx-table tr:hover td { background: #f9f8f6; }

  /* Badge */
  .badge {
    display: inline-block; border-radius: 4px; padding: 2px 7px;
    font-size: 10px; font-weight: 500; white-space: nowrap;
  }
  .badge-red    { background: #FCEBEB; color: #A32D2D; }
  .badge-orange { background: #FAEEDA; color: #854F0B; }
  .badge-grey   { background: #f5f4f0; color: #6B6966; }
  .badge-blue   { background: #E8EFFE; color: #2D4FA3; }

  /* Thumbnail placeholder */
  .thumb {
    width: 48px; height: 36px; background: #e5e4e0; border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9px; color: #aaa; flex-shrink: 0;
  }
  .thumb-row { display: flex; gap: 4px; }

  /* Video placeholder */
  .vid-thumb {
    width: 72px; height: 40px; background: #e5e4e0; border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .vid-thumb svg { opacity: 0.5; }

  /* Clickable card hint */
  .clickable-card {
    cursor: pointer; transition: filter 0.15s, transform 0.1s;
  }
  .clickable-card:hover { filter: brightness(0.96); }

  /* Barcode filter chip */
  .barcode-chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: #E8EFFE; color: #2D4FA3; border-radius: 20px;
    padding: 3px 10px; font-size: 11px; font-weight: 500;
  }
  .barcode-chip button {
    background: none; border: none; cursor: pointer; color: #2D4FA3;
    font-size: 13px; line-height: 1; padding: 0;
  }

  /* Stat pills in modal header */
  .stat-pill {
    background: #f5f4f0; border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 8px; padding: 7px 14px; font-size: 12px;
  }
  .stat-pill .val { font-weight: 500; color: #1a1a18; }
  .stat-pill .lbl { color: #888780; font-size: 11px; margin-top: 1px; }

  /* Barcode insight box */
  .barcode-insight {
    background: #E8EFFE; border: 0.5px solid #b3c2f5; border-radius: 8px;
    padding: 10px 14px; margin-bottom: 14px; font-size: 12px; color: #1a2a6e;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .barcode-insight .icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

// ── Mock transaction data generator ──────────────────────────────
const ALERT_TYPES = ["Item Left", "Item Switch", "Item Left", "Item Left", "Item Switch"];
const BARCODES = ["4901085614556","4902102141321","4901201308612","4549337665731","4987035841302","4902430642934","4901777317185"];
const BARCODE_NAMES = {
  "4901085614556": "Asahi Super Dry 350ml",
  "4902102141321": "Meiji Milk Chocolate",
  "4901201308612": "Sapporo Draft Beer 500ml",
  "4549337665731": "Pocky Chocolate 2pk",
  "4987035841302": "Kirin Ichiban 350ml",
  "4902430642934": "Kit Kat Matcha 12pk",
  "4901777317185": "Suntory Premium Malt's",
};

function seedRand(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

function generateTxns(periodKey, flagCount, noneCount) {
  const rand = seedRand(periodKey.charCodeAt(0) * 31 + flagCount);
  const baseDate = { q1: "2025-01-", q2: "2025-04-", q3: "2025-07-", q4: "2025-10-" }[periodKey];
  const txns = [];
  for (let i = 0; i < flagCount; i++) {
    const r = rand;
    const day = String(Math.floor(r() * 89) + 1).padStart(2, "0");
    const hh  = String(Math.floor(r() * 14) + 8).padStart(2, "0");
    const mm  = String(Math.floor(r() * 60)).padStart(2, "0");
    const ss  = String(Math.floor(r() * 60)).padStart(2, "0");
    const alertType = ALERT_TYPES[Math.floor(r() * ALERT_TYPES.length)];
    // Item Left doesn't have a known barcode; Item Switch has a suspect barcode
    const hasBarcode = alertType === "Item Switch";
    const bc = hasBarcode ? BARCODES[Math.floor(r() * BARCODES.length)] : null;
    const itemCount = Math.floor(r() * 3) + 1;
    const action = i < (flagCount - noneCount)
      ? (i % 3 === 0 ? "Staff Rescan" : "Customer Rescan")
      : "No Intervention";
    txns.push({
      id: `6${Math.floor(r() * 900000 + 100000)}${String.fromCharCode(97 + Math.floor(r()*26))}...`,
      datetime: `${baseDate}${day} ${hh}:${mm}:${ss}`,
      alertType,
      itemCount,
      barcode: bc,
      barcodeName: bc ? BARCODE_NAMES[bc] : null,
      action,
      // Also track all barcodes in the transaction (for normal tx lookup)
      allBarcodes: Array.from({length: itemCount}, (_, k) => BARCODES[Math.floor(rand() * BARCODES.length)]),
    });
  }
  return txns;
}

// Generate "normal" txns that contain barcodes (for barcode filter)
function generateNormalTxnsWithBarcode(periodKey, barcode, count) {
  const rand = seedRand(barcode.charCodeAt(3) * 17 + count);
  const baseDate = { q1: "2025-01-", q2: "2025-04-", q3: "2025-07-", q4: "2025-10-" }[periodKey];
  return Array.from({ length: count }, (_, i) => {
    const r = rand;
    const day = String(Math.floor(r() * 89) + 1).padStart(2, "0");
    const hh  = String(Math.floor(r() * 14) + 8).padStart(2, "0");
    const mm  = String(Math.floor(r() * 60)).padStart(2, "0");
    const ss  = String(Math.floor(r() * 60)).padStart(2, "0");
    const itemCount = Math.floor(r() * 4) + 1;
    return {
      id: `7${Math.floor(r() * 900000 + 100000)}${String.fromCharCode(97 + Math.floor(r()*26))}...`,
      datetime: `${baseDate}${day} ${hh}:${mm}:${ss}`,
      alertType: null,
      itemCount,
      barcode,
      barcodeName: BARCODE_NAMES[barcode],
      action: "Normal",
      allBarcodes: [barcode],
    };
  });
}

// ─────────────────────────────────────────────────────────────────

const STORES = {
  s1: { name: "Downtown Store", sco: 4 },
  s2: { name: "Westside Store", sco: 6 },
  s3: { name: "Eastgate Store", sco: 3 },
};

const PERIODS = {
  q1: { label: "Jan 1 – Mar 31, 2025 · Q1 2025", short: "Q1 2025",
        total: 113840, normal: 110185, normalItems: 418703, flag: 3655, flagItems: 10840,
        staff: 1758, staffItems: 5210, cust: 1166, custItems: 3470,
        none: 731, noneItems: 2160, rec: "$42,680", risk: "$10,672", recTxns: 2924, recItems: 8680,
        qtlySales: 1656000 },
  q2: { label: "Apr 1 – Jun 30, 2025 · Q2 2025", short: "Q2 2025",
        total: 118400, normal: 114460, normalItems: 434948, flag: 3940, flagItems: 11820,
        staff: 1930, staffItems: 5740, cust: 1240, custItems: 3680,
        none: 770, noneItems: 2400, rec: "$46,200", risk: "$11,340", recTxns: 3170, recItems: 9420,
        qtlySales: 1728000 },
  q3: { label: "Jul 1 – Sep 30, 2025 · Q3 2025", short: "Q3 2025",
        total: 121600, normal: 117540, normalItems: 446652, flag: 4060, flagItems: 12180,
        staff: 1980, staffItems: 5900, cust: 1310, custItems: 3890,
        none: 770, noneItems: 2390, rec: "$48,720", risk: "$11,550", recTxns: 3290, recItems: 9790,
        qtlySales: 1809000 },
  q4: { label: "Oct 1 – Dec 31, 2025 · Q4 2025", short: "Q4 2025",
        total: 109200, normal: 105540, normalItems: 401052, flag: 3660, flagItems: 10980,
        staff: 1740, staffItems: 5180, cust: 1160, custItems: 3440,
        none: 760, noneItems: 2360, rec: "$41,280", risk: "$10,830", recTxns: 2900, recItems: 8620,
        qtlySales: 1584000 },
};

const fmt = n => n.toLocaleString();
const pct = (a, b) => (a / b * 100).toFixed(1) + "%";
const T = ({ children, ...p }) => (
  <text fontFamily="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" {...p}>{children}</text>
);

const KpiCard = ({ cls, lbl, val, sub }) => {
  const colors = {
    r:  { bg: "#FCEBEB", border: "#F7C1C1", lbl: "#A32D2D", val: "#A32D2D", sub: "#A32D2D" },
    a:  { bg: "#FAEEDA", border: "#FAC775", lbl: "#854F0B", val: "#854F0B", sub: "#854F0B" },
    gr: { bg: "#EAF3DE", border: "#C0DD97", lbl: "#3B6D11", val: "#3B6D11", sub: "#3B6D11" },
    g:  { bg: "#f5f4f0", border: "rgba(0,0,0,0.12)", lbl: "#888780", val: "#1a1a18", sub: "#888780" },
  }[cls];
  return (
    <div style={{ borderRadius: 8, padding: "12px 14px", border: `0.5px solid ${colors.border}`, background: colors.bg }}>
      <div style={{ fontSize: 11, color: colors.lbl, marginBottom: 3 }}>{lbl}</div>
      <div style={{ fontSize: 20, fontWeight: 500, color: colors.val }}>{val}</div>
      <div style={{ fontSize: 11, color: colors.sub, marginTop: 2 }}>{sub}</div>
    </div>
  );
};

const LegDot = ({ color, label }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "#5f5e5a" }}>
    <div style={{ width: 10, height: 10, borderRadius: 2, background: color, flexShrink: 0 }} />
    {label}
  </div>
);

const sankeyPath = (lx, lyt, lyb, rx, ryt, ryb) => {
  const mx = (lx + rx) / 2;
  return [`M${lx} ${lyt}`, `C${mx} ${lyt} ${mx} ${ryt} ${rx} ${ryt}`,
          `L${rx} ${ryb}`, `C${mx} ${ryb} ${mx} ${lyb} ${lx} ${lyb}`, "Z"].join(" ");
};

// ── Transaction List Modal ────────────────────────────────────────
function TxModal({ mode, periodKey, period, onClose }) {
  // mode: "all-flagged" | "no-intervention"
  const [barcodeInput, setBarcodeInput] = useState("");
  const [activeBarcode, setActiveBarcode] = useState(null);
  const [showNormal, setShowNormal] = useState(false);
  const [page, setPage] = useState(1);
  const PAGE_SIZE = 8;

  const title = mode === "all-flagged"
    ? "AI-Flagged Scan Miss Transactions"
    : "No Intervention Transactions";

  // Generate mock data (small sample for demo)
  const sampleSize = mode === "all-flagged" ? Math.min(period.flag, 60) : Math.min(period.none, 30);
  const noneSize   = mode === "all-flagged" ? Math.min(period.none, 20) : Math.min(period.none, 30);

  const allTxns = useMemo(() =>
    generateTxns(periodKey, sampleSize, noneSize),
    [periodKey, sampleSize, noneSize]
  );

  const flaggedTxns = mode === "no-intervention"
    ? allTxns.filter(t => t.action === "No Intervention")
    : allTxns;

  // Barcode filter
  const handleBarcodeSearch = (e) => {
    if (e.key === "Enter" && barcodeInput.trim()) {
      setActiveBarcode(barcodeInput.trim());
      setShowNormal(false);
      setPage(1);
    }
  };

  const normalTxns = useMemo(() => {
    if (!activeBarcode) return [];
    const cnt = Math.floor(period.normal / 500); // proportional sample
    return generateNormalTxnsWithBarcode(periodKey, activeBarcode, Math.min(cnt, 20));
  }, [activeBarcode, periodKey, period.normal]);

  // Filter flagged by barcode
  const filteredFlagged = activeBarcode
    ? flaggedTxns.filter(t => t.barcode === activeBarcode || (t.allBarcodes && t.allBarcodes.includes(activeBarcode)))
    : flaggedTxns;

  const displayTxns = showNormal
    ? normalTxns
    : filteredFlagged;

  // Pagination
  const totalPages = Math.ceil(displayTxns.length / PAGE_SIZE);
  const paginated  = displayTxns.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);

  // Barcode insight stats
  const barcodeInSwitchTxns = activeBarcode
    ? flaggedTxns.filter(t => t.barcode === activeBarcode).length
    : 0;
  const barcodeInNormalTxns = normalTxns.length;
  const totalWithBarcode    = barcodeInSwitchTxns + barcodeInNormalTxns;
  const flagRate = totalWithBarcode > 0
    ? ((barcodeInSwitchTxns / totalWithBarcode) * 100).toFixed(1) + "%"
    : "—";

  const actionColor = {
    "Staff Rescan":     { bg: "#FAEEDA", color: "#854F0B" },
    "Customer Rescan":  { bg: "#EAF3DE", color: "#3B6D11" },
    "No Intervention":  { bg: "#FCEBEB", color: "#A32D2D" },
    "Normal":           { bg: "#f5f4f0", color: "#6B6966" },
  };

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal-box">
        <button className="modal-close" onClick={onClose}>✕</button>

        {/* Header */}
        <div style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
            {mode === "no-intervention" && (
              <span style={{ background: "#FCEBEB", color: "#A32D2D", borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 500 }}>
                No Intervention
              </span>
            )}
            <h2 style={{ fontSize: 16, fontWeight: 600, color: "#1a1a18" }}>{title}</h2>
          </div>
          <div style={{ fontSize: 12, color: "#888780" }}>{period.label}</div>
        </div>

        {/* Summary pills */}
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 16 }}>
          <div className="stat-pill">
            <div className="val">{fmt(mode === "all-flagged" ? period.flag : period.none)}</div>
            <div className="lbl">Total transactions</div>
          </div>
          <div className="stat-pill">
            <div className="val">{mode === "all-flagged" ? pct(period.flag, period.total) : pct(period.none, period.flag)}</div>
            <div className="lbl">{mode === "all-flagged" ? "of all txns" : "of flagged txns"}</div>
          </div>
          {mode === "all-flagged" && (
            <div className="stat-pill">
              <div className="val">{fmt(period.flagItems)}</div>
              <div className="lbl">Issued items</div>
            </div>
          )}
          {mode === "no-intervention" && (
            <div className="stat-pill" style={{ background: "#FCEBEB" }}>
              <div className="val" style={{ color: "#A32D2D" }}>{period.risk}</div>
              <div className="lbl">Est. revenue at risk</div>
            </div>
          )}
        </div>

        {/* Barcode filter */}
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>
            Filter by item barcode
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <div style={{ position: "relative", flexGrow: 1, maxWidth: 320 }}>
              <input
                value={barcodeInput}
                onChange={e => setBarcodeInput(e.target.value)}
                onKeyDown={handleBarcodeSearch}
                placeholder="Enter barcode and press Enter (e.g. 4901085614556)"
                style={{
                  width: "100%", fontSize: 12, padding: "7px 12px",
                  border: "0.5px solid rgba(0,0,0,0.22)", borderRadius: 7,
                  color: "#1a1a18", outline: "none",
                }}
              />
            </div>
            {activeBarcode && (
              <div className="barcode-chip">
                <span>🔍 {activeBarcode}</span>
                {BARCODE_NAMES[activeBarcode] && <span style={{ opacity: 0.7 }}>· {BARCODE_NAMES[activeBarcode]}</span>}
                <button onClick={() => { setActiveBarcode(null); setBarcodeInput(""); setShowNormal(false); setPage(1); }}>×</button>
              </div>
            )}
          </div>
          {/* Quick demo barcodes */}
          <div style={{ marginTop: 6, display: "flex", gap: 6, flexWrap: "wrap" }}>
            <span style={{ fontSize: 10, color: "#aaa" }}>Quick select:</span>
            {BARCODES.slice(0, 4).map(bc => (
              <button key={bc} onClick={() => { setActiveBarcode(bc); setBarcodeInput(bc); setShowNormal(false); setPage(1); }}
                style={{ fontSize: 10, padding: "2px 8px", border: "0.5px solid rgba(0,0,0,0.18)", borderRadius: 4, background: "#f5f4f0", cursor: "pointer", color: "#5f5e5a" }}>
                {bc}
              </button>
            ))}
          </div>
        </div>

        {/* Barcode insight banner */}
        {activeBarcode && (
          <div className="barcode-insight">
            <span className="icon">📊</span>
            <div>
              <strong>Barcode {activeBarcode}</strong>
              {BARCODE_NAMES[activeBarcode] && <> — {BARCODE_NAMES[activeBarcode]}</>}
              <div style={{ marginTop: 4, lineHeight: 1.6 }}>
                Found in <strong>{barcodeInSwitchTxns} AI-flagged txns</strong> (Item Switch) and <strong>{barcodeInNormalTxns} normal txns</strong> in this period.
                {totalWithBarcode > 0 && <> AI flagged rate for this barcode: <strong>{flagRate}</strong> of transactions containing it.</>}
                {" "}Note: <em>Item Left</em> events don't record which barcode was missed, so those are excluded from this analysis.
              </div>
              <div style={{ marginTop: 8, display: "flex", gap: 8 }}>
                <button
                  onClick={() => { setShowNormal(false); setPage(1); }}
                  style={{
                    fontSize: 11, padding: "4px 12px", borderRadius: 6, cursor: "pointer",
                    border: showNormal ? "0.5px solid rgba(0,0,0,0.18)" : "none",
                    background: showNormal ? "#f5f4f0" : "#2D4FA3", color: showNormal ? "#5f5e5a" : "#fff",
                    fontWeight: 500,
                  }}>
                  Flagged ({barcodeInSwitchTxns})
                </button>
                <button
                  onClick={() => { setShowNormal(true); setPage(1); }}
                  style={{
                    fontSize: 11, padding: "4px 12px", borderRadius: 6, cursor: "pointer",
                    border: !showNormal ? "0.5px solid rgba(0,0,0,0.18)" : "none",
                    background: !showNormal ? "#f5f4f0" : "#2D4FA3", color: !showNormal ? "#5f5e5a" : "#fff",
                    fontWeight: 500,
                  }}>
                  Normal txns with this item ({barcodeInNormalTxns})
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Table */}
        <div style={{ overflowX: "auto" }}>
          <table className="tx-table">
            <thead>
              <tr>
                <th>Alert ID</th>
                <th>Date / Time</th>
                <th>Alert Type</th>
                <th>Issued Items</th>
                {activeBarcode && <th>Barcode</th>}
                <th>Action</th>
                <th>Video</th>
              </tr>
            </thead>
            <tbody>
              {paginated.length === 0 && (
                <tr>
                  <td colSpan="7" style={{ textAlign: "center", color: "#aaa", padding: "28px 0" }}>
                    No transactions found for this barcode in {showNormal ? "normal" : "flagged"} records.
                  </td>
                </tr>
              )}
              {paginated.map((tx, i) => {
                const ac = actionColor[tx.action] || actionColor["Normal"];
                return (
                  <tr key={i}>
                    <td>
                      <span style={{ color: "#3B5CF6", fontWeight: 500, cursor: "pointer" }}>
                        {tx.action === "Normal" ? "—" : (
                          <>
                            {tx.action === "No Intervention" && (
                              <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: "#E24B4A", marginRight: 5, verticalAlign: "middle" }}/>
                            )}
                            {tx.id}
                          </>
                        )}
                      </span>
                      {tx.action === "Normal" && (
                        <span style={{ color: "#3B5CF6", fontWeight: 500 }}>{tx.id}</span>
                      )}
                    </td>
                    <td style={{ color: "#5f5e5a", whiteSpace: "nowrap" }}>{tx.datetime}</td>
                    <td>
                      {tx.alertType ? (
                        <span className={`badge ${tx.alertType === "Item Left" ? "badge-red" : "badge-orange"}`}>
                          {tx.alertType}
                        </span>
                      ) : (
                        <span className="badge badge-grey">—</span>
                      )}
                    </td>
                    <td>
                      <div className="thumb-row">
                        {Array.from({ length: Math.min(tx.itemCount, 3) }, (_, k) => (
                          <div key={k} className="thumb">IMG</div>
                        ))}
                      </div>
                    </td>
                    {activeBarcode && (
                      <td>
                        {tx.barcode ? (
                          <div>
                            <div style={{ fontSize: 11, fontWeight: 500, color: "#2D4FA3" }}>{tx.barcode}</div>
                            <div style={{ fontSize: 10, color: "#888780" }}>{tx.barcodeName}</div>
                          </div>
                        ) : (
                          <span style={{ color: "#ccc", fontSize: 11 }}>—</span>
                        )}
                      </td>
                    )}
                    <td>
                      <span className="badge" style={{ background: ac.bg, color: ac.color }}>
                        {tx.action}
                      </span>
                    </td>
                    <td>
                      <div className="vid-thumb">

            <div style={{ fontSize: 10, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "#3B6D11", marginBottom: 5 }}>What AI recovered</div>
            <div style={{ fontSize: 12, lineHeight: 1.6, color: "#27500A" }}>
              Staff and customer rescans together recovered <strong>{p.rec}</strong> in {p.short} — across <strong>{fmt(p.recTxns)} transactions</strong> and {fmt(p.recItems)} items flagged by AI. That's revenue that would otherwise have walked out the door undetected.
            </div>
          </div>
          <div style={{ borderRadius: 8, padding: "12px 14px", borderLeft: "3px solid #BA7517", background: "#FAEEDA" }}>
            <div style={{ fontSize: 10, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "#854F0B", marginBottom: 5 }}>Opportunity ahead</div>
            <div style={{ fontSize: 12, lineHeight: 1.6, color: "#633806" }}>
              <strong>{pNone} of flagged transactions</strong> ({fmt(p.none)} txns) had no follow-up action. Closing this gap could unlock an estimated <strong>${Math.round(parseInt(p.rec.replace(/[$,]/g,"")) * p.none / p.recTxns).toLocaleString()}+ in additional quarterly recovery</strong> for this store — without adding any new hardware.
            </div>
          </div>
        </div>

        {/* ── Key metrics ── */}
        <div style={{ fontSize: 11, fontWeight: 500, color: "#888780", letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>Key metrics</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,minmax(0,1fr))", gap: 10, marginBottom: 12 }}>
          <KpiCard cls="r"  lbl="Scan-miss rate"   val={pct(p.flag, p.total)}          sub={fmt(p.flag) + " txns · " + fmt(p.flagItems) + " items"} />
          <KpiCard cls="gr" lbl="Rescan rate"       val={pct(p.flag-p.none, p.flag)}    sub={fmt(p.flag-p.none) + " txns rescanned by staff & customer"} />
          <KpiCard cls="gr" lbl="Revenue recovered" val={p.rec}                         sub={p.short + " · avg $" + (parseInt(p.rec.replace(/[$,]/g,"")) / (p.flag-p.none)).toFixed(2) + " / incident"} />
          <KpiCard cls="a"  lbl="Revenue at risk"   val={p.risk}                        sub={fmt(p.none) + " unresolved txns · " + pNone + " of flagged"} />
        </div>

        {/* ── Legend ── */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: "0.5px solid rgba(0,0,0,0.1)", paddingTop: 8 }}>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
            {[["#C4C2BB","Normal flow"],["#A32D2D","AI-flagged"],["#854F0B","Staff rescan"],["#0F6E56","Customer rescan"],["#3B6D11","Recovered revenue"]].map(([c, l]) => (
              <LegDot key={l} color={c} label={l} />
            ))}
          </div>
          <div style={{ fontSize: 11, color: "#888780", whiteSpace: "nowrap" }}>Powered by <strong>Vision AI</strong> · {p.short}</div>
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Dashboard />);
</script>
</body>
</html>
